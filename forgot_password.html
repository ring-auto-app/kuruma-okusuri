<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="theme-color" content="#4b5563" />
    <title>車のお薬手帳</title>
  <link rel="stylesheet" href="common.css">
  <script src="app.js?v=20260528-v22"></script>
  <script src="theme.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(to bottom, var(--page-line) 1px, transparent 1px) 0 0 / 100% 34px, var(--page-bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .app-page { width: 100%; max-width: 420px; padding: 34px 16px 68px; }
    .back-link { display: block; color: var(--muted); font-size: 14px; font-weight: 800; text-decoration: none; line-height: 34px; margin-bottom: 8px; cursor: pointer; }
    .page-title { font-size: 24px; font-weight: 900; margin: 0 0 12px; line-height: 34px; }
    .lead { font-size: 14px; font-weight: 700; color: var(--muted); line-height: 1.6; margin: 0 0 24px; }
    .field { margin-bottom: 20px; }
    .label { display: block; font-size: 14px; font-weight: 900; margin-bottom: 8px; }
    input[type="text"], input[type="email"] {
      width: 100%; padding: 16px; border: 2px solid var(--line); border-radius: 12px;
      font-size: 16px; font-weight: 700; box-sizing: border-box; font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--accent); background: var(--paper); }
    .btn-submit {
      width: 100%; padding: 18px; margin-top: 8px;
      background: var(--accent); color: #fff; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 900; cursor: pointer; font-family: inherit;
    }
    .btn-submit:disabled { opacity: 0.5; }
    .note { margin-top: 20px; font-size: 12px; font-weight: 700; color: var(--muted); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="app-page">
    <a href="login.html" class="back-link">◁ ログインへ戻る</a>
    <h1 class="page-title">パスワード再設定</h1>
    <p class="lead">登録済みのメールアドレス宛に、パスワード再設定用のリンクをお送りします。</p>

    <div class="field">
      <span class="label">メールアドレス</span>
      <input type="email" id="fpEmail" placeholder="登録したメール" autocomplete="email">
    </div>
    <button type="button" class="btn-submit" id="fpBtn" onclick="submitForgot()">メールを送信</button>
    <p class="note">※ メールが届かない場合は迷惑メールフォルダをご確認ください。登録情報と一致しない場合は送信されません。</p>
  </div>
  <script>
    async function submitForgot() {
      var email = document.getElementById('fpEmail').value.trim().toLowerCase();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        if (typeof showToast === 'function') showToast('error', 'メールアドレスを確認してください');
        return;
      }
      var btn = document.getElementById('fpBtn');
      btn.disabled = true;
      if (typeof showLoading === 'function') showLoading('送信中', 'メールを準備しています...');
      try {
        var res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'request_password_reset', email: email })
        });
        var data = await res.json();
        if (typeof hideLoading === 'function') hideLoading();
        if (data.success) {
          if (typeof showToast === 'function') showToast('success', data.message || '送信しました');
          setTimeout(function () { location.href = 'login.html'; }, 1200);
        } else {
          if (typeof showToast === 'function') showToast('error', data.error || '送信に失敗しました');
        }
      } catch (e) {
        if (typeof hideLoading === 'function') hideLoading();
        if (typeof showToast === 'function') showToast('error', '通信エラーが発生しました');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
