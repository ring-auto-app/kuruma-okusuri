<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json">
  <title>QRコード読み取り — 車のお薬手帳</title>
  <link rel="stylesheet" href="common.css">
  <script src="app.js?v=20260621-v29"></script>
  <script src="theme.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(to bottom, var(--page-line, rgba(80, 65, 45, 0.10)) 1px, transparent 1px) 0 0 / 100% 34px,
        var(--page-bg, #f7f3ea);
      color: var(--text, #2f2a24);
      padding: 34px 16px 120px;
    }
    .container { max-width: 520px; margin: 0 auto; }
    .back-link {
      color: var(--muted, #a16207);
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-family: inherit;
    }
    .header {
      margin-bottom: 20px;
      border-bottom: 2px dashed var(--accent, #eab308);
      padding-bottom: 12px;
    }
    .title { font-size: 20px; font-weight: 900; margin: 8px 0 0; }
    .scan-card {
      background: var(--paper, #fff);
      border: 2px solid var(--line, #fde047);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    #qr-reader { width: 100%; min-height: 280px; }
    #qr-reader video { border-radius: 12px; }
    .result-card {
      display: none;
      background: var(--paper, #fff);
      border: 2px solid var(--line, #e0d8c8);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .result-title { font-size: 16px; font-weight: 900; margin: 0 0 8px; }
    .result-body { font-size: 14px; font-weight: 700; line-height: 1.65; color: var(--text, #2f2a24); }
    .status-msg {
      font-size: 15px;
      font-weight: 900;
      text-align: center;
      padding: 16px 8px;
      color: var(--text, #2f2a24);
    }
    .status-msg.success { color: var(--accent, #15803d); }
    .veh-card {
      background: var(--page-bg, #f7f3ea);
      border: 2px solid var(--line, #e0d8c8);
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
    }
    .veh-name { font-size: 15px; font-weight: 900; }
    .veh-meta { font-size: 12px; font-weight: 700; color: var(--muted, #7a7167); margin-top: 4px; }
    .btn-action {
      margin-top: 10px;
      width: 100%;
      min-height: var(--tap-min, 44px);
      padding: 10px;
      border: none;
      border-radius: 12px;
      background: var(--accent, #3b82f6);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-action:active { transform: scale(0.98); }
    .btn-rescan {
      width: 100%;
      min-height: var(--tap-min, 48px);
      padding: 14px;
      border: 2px solid var(--line, #e0d8c8);
      border-radius: 999px;
      background: var(--paper, #fff);
      color: var(--text, #2f2a24);
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      display: none;
    }
    .btn-rescan:active { transform: scale(0.98); }
    .empty-msg { font-size: 14px; font-weight: 700; color: var(--muted); margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button type="button" class="back-link" id="btnBack">＜ 戻る</button>
      <h1 class="title">QRコード読み取り</h1>
    </div>

    <div class="scan-card" id="scanCard">
      <div id="qr-reader"></div>
    </div>

    <div class="result-card" id="resultArea">
      <h2 class="result-title" id="resultTitle"></h2>
      <div class="result-body" id="resultBody"></div>
    </div>

    <button type="button" class="btn-rescan" id="btnRescan">もう一度読む</button>
  </div>

  <script>
    (function () {
      var html5QrCode = null;
      var scanLocked = false;

      function getProfile() {
        return typeof getCurrentProfile === 'function' ? getCurrentProfile() : null;
      }

      function qrScanGoBack() {
        if (history.length > 1) {
          history.back();
          return;
        }
        var profile = getProfile();
        if (profile && typeof ringGetHomeForProfile === 'function') {
          location.href = ringGetHomeForProfile(profile);
          return;
        }
        location.href = 'index.html';
      }

      function parseQrParams(rawText) {
        var raw = String(rawText || '').trim();
        var params = new URLSearchParams();
        try {
          var u = new URL(raw);
          u.searchParams.forEach(function (v, k) { params.set(k, v); });
        } catch (e) {
          var qIdx = raw.indexOf('?');
          if (qIdx >= 0) {
            try { params = new URLSearchParams(raw.slice(qIdx + 1)); } catch (e2) { /* ignore */ }
          }
        }
        return { raw: raw, params: params };
      }

      function showResult(title, bodyHtml) {
        document.getElementById('resultTitle').textContent = title || '';
        document.getElementById('resultBody').innerHTML = bodyHtml || '';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('btnRescan').style.display = 'block';
      }

      function hideScannerView() {
        var card = document.getElementById('scanCard');
        if (card) card.style.display = 'none';
      }

      function showScannerView() {
        document.getElementById('scanCard').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('btnRescan').style.display = 'none';
        document.getElementById('resultBody').innerHTML = '';
        document.getElementById('resultTitle').textContent = '';
      }

      function esc(s) {
        if (s == null) return '';
        return String(s).replace(/[&<>"']/g, function (c) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
        });
      }

      function showCommError(title) {
        showResult(title || '', '<p class="empty-msg">通信エラーが発生しました</p>');
      }

      function isVinAlreadyManagedLocally(vin, profile) {
        if (!vin || !profile || typeof loadVehicles !== 'function' || typeof _normalize !== 'function') return false;
        var shopId = String(profile.shopId || '').trim();
        var norm = _normalize(vin);
        return loadVehicles().some(function (v) {
          return _normalize(v.vin) === norm && String(v.shopId || '').trim() === shopId;
        });
      }

      async function fetchUserVehiclesForQr(uid) {
        var payload = { action: 'get_user_vehicles_for_qr', uid: uid };
        if (typeof ringResolveActiveAuthToken === 'function') {
          var authToken = ringResolveActiveAuthToken();
          if (authToken) payload.authToken = authToken;
        }
        var res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        return res.json();
      }

      async function handleUserShareQr(uid) {
        showResult('車両一覧', '<p class="status-msg">読み込み中...</p>');
        try {
          var json = await fetchUserVehiclesForQr(uid);
          var vehicles = (json && json.success === true && Array.isArray(json.vehicles)) ? json.vehicles : [];
          if (!json || json.success === false || !vehicles.length) {
            showResult('車両一覧', '<p class="empty-msg">車両情報が見つかりませんでした</p>');
            return;
          }
          var profile = getProfile();
          var html = '';
          vehicles.forEach(function (v, idx) {
            var label = v.carName || v.vehicleName || v.vin || '車両';
            var sub = [v.vehicleName, v.vin].filter(Boolean).join(' / ');
            html += '<div class="veh-card">' +
              '<div class="veh-name">' + esc(label) + '</div>' +
              '<div class="veh-meta">' + esc(sub) + '</div>';
            if (isVinAlreadyManagedLocally(v.vin, profile)) {
              html += '<p class="empty-msg">すでに管理車両に登録されています</p>';
            } else {
              html += '<button type="button" class="btn-action" data-vin="' + esc(v.vin) + '" data-idx="' + idx + '">管理車両に追加</button>';
            }
            html += '</div>';
          });
          showResult('車両一覧', html);
          document.querySelectorAll('.btn-action[data-vin]').forEach(function (btn) {
            btn.addEventListener('click', function () { onAddManagedVehicle(btn, vehicles[Number(btn.getAttribute('data-idx'))]); });
          });
        } catch (e) {
          showCommError('車両一覧');
        }
      }

      async function onAddManagedVehicle(btn, vehicle) {
        if (!vehicle || !vehicle.vin) return;
        var profile = getProfile();
        if (!profile || String(profile.shopType || '') === 'user') return;
        if (isVinAlreadyManagedLocally(vehicle.vin, profile)) {
          btn.style.display = 'none';
          var cardDup = btn.closest('.veh-card');
          if (cardDup && !cardDup.querySelector('.dup-msg')) {
            var dupNote = document.createElement('p');
            dupNote.className = 'empty-msg dup-msg';
            dupNote.textContent = 'すでに管理車両に登録されています';
            cardDup.appendChild(dupNote);
          }
          return;
        }
        btn.disabled = true;
        if (typeof showLoading === 'function') showLoading('登録中', '読み込み中...');
        try {
          var res = await addVehicle({
            vin: vehicle.vin,
            model: vehicle.carName || vehicle.vehicleName || '名称未設定',
            vehicleName: vehicle.vehicleName || '',
            vehicleCategory: 'managed',
            shopId: profile.shopId || '',
            shopName: profile.shopName || '',
            shopType: profile.shopType || '',
            createdAt: new Date().toISOString()
          });
          if (typeof hideLoading === 'function') hideLoading();
          if (res && res.success === false && !res.queued) {
            btn.disabled = false;
            var cardErr = btn.closest('.veh-card');
            if (cardErr && !cardErr.querySelector('.comm-err-msg')) {
              var errNote = document.createElement('p');
              errNote.className = 'empty-msg comm-err-msg';
              errNote.textContent = '通信エラーが発生しました';
              cardErr.appendChild(errNote);
            }
            return;
          }
          btn.textContent = '追加済み';
          var card = btn.closest('.veh-card');
          if (card) {
            var note = card.querySelector('.add-done-msg');
            if (!note) {
              note = document.createElement('p');
              note.className = 'status-msg success add-done-msg';
              note.textContent = '管理車両へ追加しました';
              card.appendChild(note);
            }
          }
          if (typeof showToast === 'function' && res && res.queued) {
            showToast('info', '端末に保存しました（同期待ち）');
          }
        } catch (err) {
          if (typeof hideLoading === 'function') hideLoading();
          btn.disabled = false;
          var cardCatch = btn.closest('.veh-card');
          if (cardCatch && !cardCatch.querySelector('.comm-err-msg')) {
            var catchNote = document.createElement('p');
            catchNote.className = 'empty-msg comm-err-msg';
            catchNote.textContent = '通信エラーが発生しました';
            cardCatch.appendChild(catchNote);
          }
        }
      }

      async function handleShopQr(shopId) {
        var profile = getProfile();
        if (!profile) {
          localStorage.setItem('ring_pending_fav_shop', String(shopId).trim());
          showResult('かかりつけ登録', '<p class="empty-msg">ログイン後にかかりつけ登録できます。</p>');
          return;
        }
        if (String(profile.shopType || '') !== 'user') {
          showResult('かかりつけ登録', '<p class="empty-msg">一般ユーザーアカウントで読み取ってください。</p>');
          return;
        }
        showResult('かかりつけ登録', '<p class="status-msg">読み込み中...</p>');
        if (typeof ringPromptAndSaveFavShop_ === 'function') {
          var favRes = await ringPromptAndSaveFavShop_(shopId);
          if (favRes && favRes.commError) {
            showCommError('かかりつけ登録');
          } else if (favRes && favRes.shopInfoFailed) {
            showResult('かかりつけ登録', '<p class="empty-msg">店舗情報を取得できませんでした</p>');
          } else if (favRes && favRes.ok && !favRes.duplicate) {
            showResult('かかりつけ登録', '<p class="status-msg success">登録が完了しました</p>');
          } else if (favRes && favRes.duplicate) {
            showResult('かかりつけ登録', '<p class="empty-msg">すでにかかりつけ工場に登録されています</p>');
          } else if (favRes && favRes.cancelled) {
            showResult('かかりつけ登録', '<p class="empty-msg">登録をキャンセルしました。</p>');
          }
        }
      }

      async function processQrResult(rawText) {
        try {
          var parsed = parseQrParams(rawText);
          var p = parsed.params;
          var action = String(p.get('action') || '').trim().toLowerCase();
          var uid = String(p.get('uid') || '').trim();
          var shopId = String(p.get('shop') || '').trim();
          var profile = getProfile();
          var shopType = profile ? String(profile.shopType || '') : '';

          if (action === 'user' && uid) {
            if (shopType !== 'user') {
              await handleUserShareQr(uid);
            } else {
              showResult('', '<p class="empty-msg">このQRは工場・事業者向けです。お店のスタッフに読み取ってもらってください。</p>');
            }
            return;
          }
          if (shopId) {
            await handleShopQr(shopId);
            return;
          }
          showResult('', '<p class="empty-msg">対応していないQRコードです。</p>');
        } catch (e) {
          showCommError('');
        }
      }

      function showCameraFail(err) {
        console.error(err);
        hideScannerView();
        showResult('カメラエラー', '<p class="empty-msg">カメラを起動できませんでした。ブラウザのカメラ権限を確認してください。</p>');
      }

      function onScanSuccess(decodedText) {
        if (scanLocked) return;
        scanLocked = true;
        var done = function () {
          hideScannerView();
          processQrResult(decodedText);
        };
        if (!html5QrCode) {
          done();
          return;
        }
        html5QrCode.stop().then(done).catch(function (err) {
          console.error(err);
          done();
        });
      }

      function startScanner() {
        scanLocked = false;
        showScannerView();
        if (typeof Html5Qrcode !== 'function') {
          showCameraFail(new Error('html5-qrcode が読み込まれていません'));
          return;
        }
        if (!html5QrCode) html5QrCode = new Html5Qrcode('qr-reader');
        var config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start(
          { facingMode: 'environment' },
          config,
          onScanSuccess,
          function () { /* 未検出 — 無視 */ }
        ).catch(function (err) {
          showCameraFail(err);
        });
      }

      function resetAndRescan() {
        scanLocked = false;
        document.getElementById('resultTitle').textContent = '';
        document.getElementById('resultBody').innerHTML = '';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('btnRescan').style.display = 'none';
        if (html5QrCode) {
          html5QrCode.stop().catch(function () { /* ignore */ }).finally(function () {
            html5QrCode.clear().catch(function () { /* ignore */ }).finally(startScanner);
          });
          return;
        }
        startScanner();
      }

      document.getElementById('btnBack').addEventListener('click', function () {
        if (html5QrCode && !scanLocked) {
          html5QrCode.stop().catch(function () { /* ignore */ }).finally(qrScanGoBack);
          return;
        }
        qrScanGoBack();
      });

      document.getElementById('btnRescan').addEventListener('click', resetAndRescan);

      window.addEventListener('DOMContentLoaded', function () {
        var profile = getProfile();
        if (profile && typeof applyRingPalette === 'function') {
          var persona = String(profile.shopType || '') === 'user' ? 'user'
            : (String(profile.shopType || '') === 'dealer' ? 'dealer' : 'factory');
          applyRingPalette(persona);
        }
        startScanner();
      });
    })();
  </script>
</body>
</html>
