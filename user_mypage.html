<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json">
    <title>車のお薬手帳</title>
  <link rel="stylesheet" href="common.css">
  <script src="app.js?v=20260528-v22"></script>
  <script src="theme.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: var(--page-bg); color: var(--text); padding: 34px 16px 100px; }
    .container { max-width: 560px; margin: 0 auto; }
    .header { margin-bottom: 24px; border-bottom: 2px dashed var(--accent); padding-bottom: 12px; }
    .back-link { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 800; cursor: pointer; }
    .title { font-size: 22px; font-weight: 900; margin: 8px 0 0; }
    .section { margin-top: 28px; }
    .section-title { font-size: 13px; font-weight: 900; color: var(--text); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--line); }
    .id-box {
      background: var(--paper); border: 2px solid var(--line); border-radius: 14px; padding: 14px 16px;
      font-size: 13px; font-weight: 800; line-height: 1.6;
    }
    .id-box .row { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin: 6px 0; }
    .id-box .k { color: var(--muted); }
    .id-box .v { word-break: break-all; text-align: right; }
    .mini-list { background: var(--paper); border: 2px solid var(--line); border-radius: 14px; overflow: hidden; }
    .mini-item {
      display: block; padding: 12px 14px; border-bottom: 1px dashed var(--line); text-decoration: none; color: inherit;
      font-size: 14px; font-weight: 800;
    }
    .mini-item:last-child { border-bottom: none; }
    .mini-item:active { opacity: 0.85; }
    .mini-sub { font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 4px; }
    .nick-edit { margin-top: 14px; }
    .nick-edit label { display: block; font-size: 12px; font-weight: 900; color: var(--muted); margin-bottom: 6px; }
    .nick-edit input[type="text"] {
      width: 100%; padding: 12px 14px; border: 2px solid var(--line); border-radius: 12px;
      font-size: 16px; font-weight: 700; box-sizing: border-box; font-family: inherit;
    }
    .nick-save-wrap { margin-top: 10px; }
    .empty-hint { font-size: 12px; font-weight: 800; color: var(--muted); padding: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a class="back-link" onclick="goBackSmart('user_home.html')">◁ 戻る</a>
      <h1 class="title">マイページ</h1>
    </div>

    <div class="section">
      <div class="section-title">アカウント</div>
      <div class="id-box" id="profileBox">
        <div class="row"><span class="k">ニックネーム</span><span class="v" id="dispName">—</span></div>
        <div class="row"><span class="k">ユーザーID</span><span class="v" id="dispUserId">—</span></div>
        <div class="row"><span class="k">ログインID</span><span class="v" id="dispLoginId">—</span></div>
        <div class="row"><span class="k">メール</span><span class="v" id="dispEmail">—</span></div>
      </div>
      <div class="nick-edit">
        <label for="nickInput">ニックネームを変更</label>
        <input type="text" id="nickInput" maxlength="50" placeholder="例：なっぴー" autocomplete="nickname">
        <div class="nick-save-wrap">
          <button type="button" class="btn btn-primary" id="nickSaveBtn">保存</button>
        </div>
      </div>
      <div class="btn-stack">
        <a class="btn btn-primary" href="change_password.html">パスワード変更</a>
      </div>
      <div class="ring-line-promo-slot" data-ring-line-promo style="margin-top:14px;"></div>
    </div>

    <div class="section">
      <div class="section-title">登録している車</div>
      <div class="mini-list" id="vehicleList"></div>
      <div class="btn-stack">
        <a class="btn btn-secondary" href="vehicles.html">すべての車を見る・追加</a>
      </div>
    </div>

    <div class="section">
      <div class="section-title">かかりつけの工場・お店</div>
      <div class="mini-list" id="favList"></div>
      <div class="btn-stack">
        <a class="btn btn-secondary" href="user_fav_shops.html">一覧・解除</a>
        <a class="btn btn-secondary" href="user_fav_shop_edit.html">検索して追加・編集</a>
      </div>
    </div>
  </div>

  <script>
    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
      });
    }

    function getUserVehicles(profile) {
      var all = JSON.parse(localStorage.getItem('nappy_vehicles_v1') || '[]');
      var uid = profile.userId || '';
      return all.filter(function (car) {
        return car.userId === uid || car.ownerId === uid || car.shopId === uid;
      });
    }

    function getFavShops() {
      return JSON.parse(localStorage.getItem('nappy_fav_shops_v1') || '[]');
    }

    window.addEventListener('DOMContentLoaded', function () {
      var profile = typeof getCurrentProfile === 'function' ? getCurrentProfile() : null;
      if (!profile || profile.shopType !== 'user') {
        location.replace('login.html');
        return;
      }
      var r = String(profile.role || '');
      if (r !== 'user' && r !== 'admin') {
        location.replace('login.html');
        return;
      }

      var dispNm = document.getElementById('dispName');
      dispNm.textContent = (profile.userName && String(profile.userName).trim()) ? profile.userName : '未設定';
      document.getElementById('dispUserId').textContent = profile.userId || '—';
      document.getElementById('dispLoginId').textContent = profile.loginId || profile.userId || '—';
      var emEl = document.getElementById('dispEmail');
      if (emEl) emEl.textContent = profile.registeredEmail || profile.googleEmail || '—';

      var nickInput = document.getElementById('nickInput');
      nickInput.value = profile.userName ? String(profile.userName) : '';

      document.getElementById('nickSaveBtn').onclick = async function () {
        var v = nickInput.value.trim();
        if (v.length > 50) {
          if (typeof showToast === 'function') showToast('error', '50文字以内にしてください');
          return;
        }
        var btn = document.getElementById('nickSaveBtn');
        btn.disabled = true;
        try {
          if (typeof showLoading === 'function') showLoading('保存中', '');
          var data = await sendToGAS_Safe('user_update_profile', { userName: v });
          if (typeof hideLoading === 'function') hideLoading();
          if (data.profile) {
            var p = typeof getCurrentProfile === 'function' ? getCurrentProfile() : {};
            Object.assign(p, data.profile);
            var tok = localStorage.getItem('ring_auth_token');
            if (typeof login === 'function') login(p, tok || undefined);
          }
          dispNm.textContent = v || '未設定';
          if (typeof showToast === 'function') showToast('success', 'ニックネームを保存しました');
        } catch (e) {
          if (typeof hideLoading === 'function') hideLoading();
          if (typeof showToast === 'function') showToast('error', (e && e.message) ? e.message : '保存に失敗しました');
        } finally {
          btn.disabled = false;
        }
      };

      var vehicles = getUserVehicles(profile);
      var vEl = document.getElementById('vehicleList');
      if (!vehicles.length) {
        vEl.innerHTML = '<div class="empty-hint">まだ車がありません。車両登録から追加できます。</div>';
      } else {
        vEl.innerHTML = vehicles.slice(0, 8).map(function (car) {
          var name = car.model || car.nickname || '名称未設定';
          var sub = car.vin ? car.vin : '';
          return '<a class="mini-item" href="vehicle_info.html?vin=' + encodeURIComponent(car.vin) + '">' +
            esc(name) + '<div class="mini-sub">' + esc(sub) + '</div></a>';
        }).join('');
        if (vehicles.length > 8) {
          vEl.innerHTML += '<div class="empty-hint">他 ' + (vehicles.length - 8) + ' 台（一覧へ）</div>';
        }
      }

      var favs = getFavShops();
      var fEl = document.getElementById('favList');
      if (!favs.length) {
        fEl.innerHTML = '<div class="empty-hint">未登録です。検索から追加できます。</div>';
      } else {
        fEl.innerHTML = favs.slice(0, 6).map(function (s) {
          return '<a class="mini-item" href="user_fav_shop_edit.html?shopId=' + encodeURIComponent(s.shopId) + '">' +
            esc(s.shopName || s.shopId) +
            '<div class="mini-sub">' + esc(s.factoryNumber || s.address || '') + '</div></a>';
        }).join('');
      }
    });
  </script>
</body>
</html>
