<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="theme-color" content="#4b5563" />
    <title>車のお薬手帳</title>
  <link rel="stylesheet" href="common.css">
  <script src="app.js?v=20260528-v25"></script>
  <script src="theme.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(to bottom, var(--page-line) 1px, transparent 1px) 0 0 / 100% 34px, var(--page-bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .app-page { width: 100%; max-width: 420px; padding: 34px 16px 68px; }
    .back-link { display: block; color: var(--muted); font-size: 14px; font-weight: 800; text-decoration: none; line-height: 34px; margin-bottom: 8px; }
    .page-title { font-size: 24px; font-weight: 900; margin: 0 0 12px; }
    .lead { font-size: 14px; font-weight: 700; color: var(--muted); line-height: 1.6; margin: 0 0 24px; }
    .field { margin-bottom: 20px; }
    .label { display: block; font-size: 14px; font-weight: 900; margin-bottom: 8px; }
    .pw-wrap { position: relative; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 16px 48px 16px 16px; border: 2px solid var(--line); border-radius: 12px;
      font-size: 16px; font-weight: 700; box-sizing: border-box; font-family: inherit;
    }
    .pw-toggle-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: var(--tap-min); height: var(--tap-min); border: none; background: none; cursor: pointer; color: var(--muted);
    }
    .btn-submit {
      width: 100%; padding: 18px; margin-top: 8px;
      background: var(--accent); color: #fff; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 900; cursor: pointer; font-family: inherit;
    }
    .btn-submit:disabled { opacity: 0.5; }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--line); }
    .strength-bar .fill { height: 100%; border-radius: 2px; width: 0; transition: 0.3s; }
    .strength-label { font-size: 11px; font-weight: 800; margin-top: 4px; color: var(--muted); }
    .err-banner {
      display: none; background: #fef2f2; border: 2px solid #fecaca; color: #991b1b;
      padding: 12px 14px; border-radius: 12px; font-size: 13px; font-weight: 800; margin-bottom: 20px; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app-page">
    <a href="login.html" class="back-link">◁ ログインへ</a>
    <h1 class="page-title">新しいパスワード</h1>
    <p class="lead">メールのリンクから開いた場合、トークンが自動で適用されています。</p>

    <div class="err-banner" id="tokenErr">リンクが無効か期限切れです。再設定をやり直してください。</div>

    <div class="field">
      <span class="label">新しいパスワード（8文字以上）</span>
      <div class="pw-wrap">
        <input type="password" id="newPw" placeholder="新しいパスワード" autocomplete="new-password" oninput="checkStrength(this.value)">
        <button type="button" class="pw-toggle-btn" onclick="togglePw('newPw', this)">👁</button>
      </div>
      <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel">強度：未入力</div>
    </div>
    <div class="field">
      <span class="label">新しいパスワード（確認）</span>
      <div class="pw-wrap">
        <input type="password" id="newPw2" placeholder="もう一度" autocomplete="new-password">
        <button type="button" class="pw-toggle-btn" onclick="togglePw('newPw2', this)">👁</button>
      </div>
    </div>
    <button type="button" class="btn-submit" id="saveBtn" onclick="submitReset()">パスワードを設定する</button>
  </div>
  <script>
    function parseQuery() {
      var q = window.location.search.slice(1).split('&');
      var o = {};
      q.forEach(function (p) {
        var x = p.split('=');
        if (x[0]) o[decodeURIComponent(x[0])] = decodeURIComponent(x[1] || '');
      });
      return o;
    }

    var qp = parseQuery();
    var token = qp.token || '';
    var loginIdLegacy = qp.loginId || '';

    function togglePw(inputId, btn) {
      var el = document.getElementById(inputId);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function checkStrength(val) {
      var fill = document.getElementById('strengthFill');
      var label = document.getElementById('strengthLabel');
      if (!val) { fill.style.width = '0'; label.textContent = '強度：未入力'; return; }
      var score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      var levels = [
        { pct: '20%', color: '#ef4444', text: '弱い' },
        { pct: '40%', color: '#f97316', text: 'やや弱い' },
        { pct: '60%', color: '#eab308', text: '普通' },
        { pct: '80%', color: '#84cc16', text: '強い' },
        { pct: '100%', color: '#10b981', text: '非常に強い' }
      ];
      var lv = levels[Math.min(score, 4)];
      fill.style.width = lv.pct;
      fill.style.background = lv.color;
      label.textContent = '強度：' + lv.text;
    }

    window.addEventListener('DOMContentLoaded', function () {
      if (!token) {
        document.getElementById('tokenErr').style.display = 'block';
        document.getElementById('saveBtn').disabled = true;
      }
    });

    async function submitReset() {
      if (!token) return;
      var p1 = document.getElementById('newPw').value;
      var p2 = document.getElementById('newPw2').value;
      if (p1.length < 8) {
        if (typeof showToast === 'function') showToast('error', '8文字以上にしてください');
        return;
      }
      if (p1 !== p2) {
        if (typeof showToast === 'function') showToast('error', '確認用パスワードが一致しません');
        return;
      }
      var btn = document.getElementById('saveBtn');
      btn.disabled = true;
      if (typeof showLoading === 'function') showLoading('処理中', 'パスワードを更新しています...');
      try {
        var payload = {
            action: 'reset_password_with_token',
            token: token,
            newPassword: p1
          };
        if (loginIdLegacy) payload.loginId = loginIdLegacy;
        var res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        var data = await res.json();
        if (typeof hideLoading === 'function') hideLoading();
        if (data.success) {
          if (typeof showToast === 'function') showToast('success', '設定しました。ログインしてください');
          setTimeout(function () { location.href = 'login.html'; }, 900);
        } else {
          if (typeof showToast === 'function') showToast('error', data.error || '失敗しました');
        }
      } catch (e) {
        if (typeof hideLoading === 'function') hideLoading();
        if (typeof showToast === 'function') showToast('error', '通信エラーが発生しました');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
