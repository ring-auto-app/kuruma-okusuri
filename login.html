<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json">
  <title>ログイン | 車のお薬手帳</title>
  
  <link rel="stylesheet" href="common.css">
  <script src="app.js"></script>
  <script src="theme.js"></script>
  
  <style>
    :root {
      --paper-bg: #f7f3ea; 
      --paper-line: rgba(80, 65, 45, 0.10); 
      --text-main: #2f2a24;
      --text-sub: #7a7167;
      --neutral-action: #4b5563; 
      --neutral-light: rgba(75, 85, 99, 0.15);
      --line-green: #06C755;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(to bottom, var(--paper-line) 1px, transparent 1px) 0 0 / 100% 34px,
        var(--paper-bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .app-page {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      padding: 34px 16px 68px;
    }

    .back-link {
      display: block;
      color: var(--text-sub);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      line-height: 34px;
      cursor: pointer;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 34px;
    }

    .page-title {
      display: inline-block;
      position: relative;
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.05em;
      z-index: 1;
      height: 34px;
      line-height: 34px;
    }

    .page-title::after {
      content: "";
      position: absolute;
      left: -8px; right: -8px; bottom: 2px;
      height: 12px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      z-index: -1;
      transform: rotate(-1deg);
    }

    /* タブ */
    .tab-bar {
      display: flex;
      border-radius: 12px;
      background: var(--neutral-light);
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      min-height: var(--tap-min);
      padding: 8px 4px;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 900;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active {
      background: white;
      color: var(--text-main);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* LINEボタン */
    .btn-line {
      width: 100%;
      padding: 16px;
      background: var(--line-green);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(6, 199, 85, 0.2);
      margin-bottom: 24px;
      transition: transform 0.1s;
    }
    .btn-line:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 800;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--neutral-light);
      margin: 0 10px;
    }

    .field { margin-bottom: 24px; text-align: left; }

    .label {
      display: block;
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .password-field-container { position: relative; width: 100%; }

    input {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid var(--neutral-light);
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      box-sizing: border-box;
      text-align: center;
      letter-spacing: 1px;
      color: var(--text-main);
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus { background: #ffffff; border-color: var(--neutral-action); }

    .password-toggle-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: var(--tap-min);
      height: var(--tap-min);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-sub);
      border-radius: 50%;
      -webkit-tap-highlight-color: transparent;
    }
    .password-toggle-btn:active { background: rgba(0,0,0,0.06); }

    .btn-submit {
      width: 100%;
      padding: 18px;
      background: var(--neutral-action);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn-submit:active { transform: scale(0.98); }

    /* デモエリア */
    .demo-area {
      margin-top: 34px;
      padding: 16px;
      border: 2px dashed var(--neutral-light);
      border-radius: 16px;
      text-align: center;
    }
    .demo-title { font-size: 12px; font-weight: 900; color: var(--text-sub); margin-bottom: 12px; display: block; }
    .demo-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .demo-links a { color: var(--text-main); font-size: 14px; font-weight: 900; text-decoration: underline; cursor: pointer; }

    /* 新規登録タブ：案内カード */
    .register-card {
      background: rgba(255,255,255,0.7);
      border: 2px solid var(--neutral-light);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .register-card .icon { font-size: 40px; display: block; margin-bottom: 12px; }
    .register-card h3 { font-size: 18px; font-weight: 900; margin: 0 0 10px; }
    .register-card p { font-size: 13px; font-weight: 700; color: var(--text-sub); line-height: 1.7; margin: 0 0 20px; }

    .btn-register {
      width: 100%;
      padding: 17px;
      background: var(--neutral-action);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-register:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="app-page">
    <a onclick="location.href='index.html'" class="back-link">◁ トップへ戻る</a>

    <header class="page-header">
      <h1 class="page-title">事業者・工場ログイン</h1>
    </header>

    <!-- タブ -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">新規登録</button>
    </div>

    <!-- ===== ログインタブ ===== -->
    <div class="tab-panel active" id="panelLogin">
      <button class="btn-line" onclick="doLineLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="margin-bottom:-2px;"><path d="M24 10.304c0-4.636-5.383-8.404-12-8.404s-12 3.768-12 8.404c0 4.156 4.27 7.632 10.04 8.296.39.085.92.258 1.058.59.12.285.08.733.038 1.022l-.185 1.118c-.056.34-.27 1.33 1.163.725 1.432-.605 7.732-4.554 10.545-7.796 1.01-1.202 1.34-2.03 1.34-3.955z"/></svg>
        LINEでログイン / 登録
      </button>

      <div class="divider">またはIDでログイン</div>

      <div class="field">
        <span class="label">ログインID</span>
        <input type="text" id="inLoginId" placeholder="IDを入力" autocomplete="off">
      </div>
      
      <div class="field">
        <span class="label">パスワード</span>
        <div class="password-field-container">
          <input type="password" id="inPassword" placeholder="****">
          <button type="button" class="password-toggle-btn" id="togglePasswordBtn" onclick="togglePasswordVisibility()">
            <svg id="eyeIcon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" onclick="doLogin()">ログインする</button>

      <div class="demo-area">
        <span class="demo-title">【開発用デモ】</span>
        <div class="demo-links">
          <a onclick="doDemoLogin('factory')">工場モード</a>
          <a onclick="doDemoLogin('dealer')">事業者モード</a>
          <a onclick="doDemoLogin('user')">ユーザーモード</a>
        </div>
      </div>
    </div>

    <!-- ===== 新規登録タブ ===== -->
    <div class="tab-panel" id="panelRegister">
      <button class="btn-line" onclick="doLineLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="margin-bottom:-2px;"><path d="M24 10.304c0-4.636-5.383-8.404-12-8.404s-12 3.768-12 8.404c0 4.156 4.27 7.632 10.04 8.296.39.085.92.258 1.058.59.12.285.08.733.038 1.022l-.185 1.118c-.056.34-.27 1.33 1.163.725 1.432-.605 7.732-4.554 10.545-7.796 1.01-1.202 1.34-2.03 1.34-3.955z"/></svg>
        LINEで登録する
      </button>

      <div class="divider">またはフォームで登録</div>

      <div class="register-card">
        <span class="icon">🏢</span>
        <h3>事業者・整備工場の新規登録</h3>
        <p>
          店舗ID・マスターログインIDを発行します。<br>
          登録後すぐにスタッフ管理や整備記録の入力が可能になります。
        </p>
        <button class="btn-register" onclick="location.href='biz_register.html'">
          新規登録フォームへ進む
        </button>
      </div>
    </div>
  </div>

  <script>
    /* ===== タブ切り替え ===== */
    function switchTab(tab) {
      const isLogin = (tab === 'login');
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      document.getElementById('panelLogin').classList.toggle('active', isLogin);
      document.getElementById('panelRegister').classList.toggle('active', !isLogin);
    }

    /* ===== LINE（将来実装） ===== */
    function doLineLogin() {
      showToast('info', 'LINE連携は近日公開予定です');
    }

    /* ===== パスワード表示切替 ===== */
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('inPassword');
      const eyeIcon = document.getElementById('eyeIcon');
      const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
      const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = eyeClosed;
      } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = eyeOpen;
      }
    }

    /* ===== デモログイン ===== */
    function doDemoLogin(role) {
      showLoading("デモ認証中", "テスト環境を準備しています...");
      setTimeout(() => {
        const demoShopId = role === 'factory' ? "SHOP-DEMO-F" : (role === 'dealer' ? "SHOP-DEMO-D" : "");
        const demoRole = (role === 'factory' || role === 'dealer') ? 'master' : role;
        const dummyProfile = {
          userId:   role === 'factory' ? "F-DEMO01" : (role === 'dealer' ? "D-DEMO01" : "U-DEMO01"),
          userName: "デモ太郎",
          shopName: role === 'factory' ? "RinG Auto 整備工場" : (role === 'dealer' ? "T.G販売店" : ""),
          shopType: role,
          role:     demoRole,
          shopId:   demoShopId
        };
        if (role === 'factory') {
          dummyProfile.factoryType = '指定工場';
          dummyProfile.factoryNumber = '第11234号';
        } else if (role === 'dealer') {
          dummyProfile.factoryType = '認証';
          dummyProfile.factoryNumber = '第55678号';
        }
        if (typeof seedDemoEnvironment === 'function') seedDemoEnvironment(role);
        login(dummyProfile);
        let target = "user_home.html";
        if (role === 'factory') target = "factory_home.html";
        if (role === 'dealer')  target = "dealer_home.html";
        location.replace(target);
      }, 800);
    }

    /* ===== 本番ログイン ===== */
    async function doLogin() {
      const loginId = document.getElementById('inLoginId').value.trim().toUpperCase();
      const pass    = document.getElementById('inPassword').value.trim();
      if (!loginId || !pass) {
        showToast('error', 'IDとパスワードを入力してください');
        return;
      }
      showLoading("認証中", "ログイン情報を照合しています...");
      try {
        const res    = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'login', loginId: loginId, password: pass })
        });
        const result = await res.json();
        if (result.success) {
          login(result.profile, result.authToken);
          location.replace(result.profile.shopType === 'factory' ? "factory_home.html" : "dealer_home.html");
        } else {
          hideLoading();
          showToast('error', 'ログイン失敗: ' + result.error);
        }
      } catch (e) {
        hideLoading();
        showToast('error', '通信エラーが発生しました');
      }
    }
  </script>
</body>
</html>
