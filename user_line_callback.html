<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <title>LINEログイン処理中 | 車のお薬手帳</title>
  <link rel="stylesheet" href="common.css">
  <script src="app.js"></script>
  <script src="theme.js"></script>
</head>
<body>
  <div class="container" style="padding-top:48px; text-align:center; font-weight:800;">
    <p style="margin:0;">LINEでログインしています…</p>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      if (typeof ringHandleLineOAuthCallback === 'function') {
        ringHandleLineOAuthCallback().catch(function (e) {
          try {
            if (typeof hideLoading === 'function') hideLoading();
          } catch (e2) { /* ignore */ }
          try {
            if (typeof showToast === 'function') showToast('error', 'ログインに失敗しました');
          } catch (e3) { /* ignore */ }
          location.replace('user_login.html');
        });
      } else {
        try {
          if (typeof showToast === 'function') showToast('error', 'ログインに失敗しました');
        } catch (e4) { /* ignore */ }
        location.replace('user_login.html');
      }
    });
  </script>
</body>
</html>
