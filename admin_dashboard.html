<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#334155" />
  <title>管理者ダッシュボード | 車のお薬手帳</title>
  <link rel="stylesheet" href="common.css">
  <script src="app.js"></script>
  <style>
    /* 管理コンソール専用（ノートUI・theme.js に依存しない） */
    body.ring-admin-app {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: #f1f5f9;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
      padding: 20px 16px 48px;
      line-height: 1.5;
      box-sizing: border-box;
    }

    .ring-admin-app .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .ring-admin-app .header {
      display: block;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e2e8f0;
    }

    .ring-admin-app .back-link {
      display: inline-block;
      margin-bottom: 8px;
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      line-height: 1.4;
    }
    .ring-admin-app .back-link:hover {
      color: #2563eb;
    }

    .ring-admin-app .title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 0;
      line-height: 1.3;
      position: static;
    }
    .ring-admin-app .title::after {
      display: none;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px 12px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .stat-val {
      font-size: 1.35rem;
      font-weight: 700;
      color: #2563eb;
      line-height: 1.2;
    }
    .stat-lbl {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.35;
    }
    .section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
    }
    .config-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    .config-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .config-key {
      font-size: 13px;
      font-weight: 600;
      min-width: 160px;
      flex: 1 1 200px;
      line-height: 1.35;
      color: #334155;
    }
    .config-key-system {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: #94a3b8;
      font-family: ui-monospace, "Cascadia Code", monospace;
      margin-top: 4px;
    }
    .config-row input {
      flex: 1;
      min-width: 120px;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      background: #fff;
      color: #0f172a;
    }
    .config-row input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .btn-sm {
      min-height: 44px;
      padding: 0 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
    }
    .btn-sm:hover {
      background: #1d4ed8;
    }
    .btn-sm.secondary {
      background: #64748b;
    }
    .btn-sm.secondary:hover {
      background: #475569;
    }
    .gate-panel h2 { margin: 0 0 8px; font-size: 1rem; font-weight: 700; color: #0f172a; }
    .gate-fields-top { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .gate-fields-top input {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      background: #fff;
      color: #0f172a;
    }
    .gate-fields-top input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .muted {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
      line-height: 1.55;
      margin-top: 8px;
    }
    .ring-admin-app code {
      font-size: 0.85em;
      padding: 2px 6px;
      border-radius: 4px;
      background: #f1f5f9;
      color: #475569;
    }
    .ring-admin-app a {
      color: #2563eb;
      font-weight: 600;
    }
  </style>
</head>
<body class="ring-admin-app">
  <div class="container">
    <div class="header">
      <a href="user_home.html" class="back-link">ホームへ戻る</a>
      <h1 class="title">管理者ダッシュボード</h1>
    </div>

    <div id="gatePanel" class="section gate-panel" style="display:none;">
      <h2>管理者ゲート</h2>
      <p class="muted" style="margin-top:0;">Script Properties の <code>ADMIN_BACKDOOR_LOGIN_ID</code> / <code>ADMIN_BACKDOOR_PASSWORD_RECORD</code> のみに保存した専用ログインです（リポジトリには含めません）。</p>
      <div class="gate-fields-top">
        <input type="text" id="gateId" placeholder="ゲート用ログインID" autocomplete="username">
        <input type="password" id="gatePw" placeholder="ゲート用パスワード" autocomplete="current-password">
        <button type="button" class="btn-sm secondary" onclick="doGateLogin()">ログインしてダッシュボードへ</button>
      </div>
      <p class="muted" style="margin-bottom:0;"><a href="user_login.html">通常のユーザーログインはこちら</a>（シート上で B 列が admin のアカウントでも入れます）</p>
    </div>

    <div id="dashMain" style="display:none;">
    <div class="admin-grid" id="statGrid"></div>

    <div class="section">
      <h2>システム設定</h2>
      <p class="muted" style="margin-top:0;">スプレッドシートの「config」シートに保存されます。保存するとサーバー側の挙動（車検リマインドの日数など）に反映されます。</p>
      <div id="configArea"></div>
    </div>

    </div><!-- /dashMain -->
  </div>

  <script>
    /** 表示ラベル専用。GAS へ送るキーは API の key のまま（英語）。 */
    var RING_ADMIN_CONFIG_LABELS = {
      inspection_remind_days_before: '車検リマインド通知（何日前に送るか）',
      password_reset_valid_minutes: 'パスワード再設定リンクの有効期限（分）',
      ad_daily_impression_cap: '広告の1日あたり表示上限（将来用）'
    };

    function configLabelJa(key) {
      var k = String(key || '');
      return RING_ADMIN_CONFIG_LABELS[k] || k;
    }

    function renderStats(sum) {
      var g = document.getElementById('statGrid');
      if (!g || !sum) return;
      var items = [
        ['ユーザー数', sum.userCount],
        ['登録店舗（工場）', sum.shopFactoryCount != null ? sum.shopFactoryCount : '—'],
        ['登録店舗（事業者・販売店）', sum.shopDealerCount != null ? sum.shopDealerCount : '—'],
        ['店舗合計', sum.shopTotal],
        ['審査完了・稼働中の店舗', sum.shopApproved],
        ['審査待ちの店舗', sum.shopPending],
        ['広告表示回数（累計）', sum.adImpressions],
        ['本日のメール送信・残り枠', sum.mailRemainingQuota],
        ['LINE送信（記録）', sum.lineMessagesSent],
        ['システム設定項目数', sum.configKeys]
      ];
      g.innerHTML = items.map(function (x) {
        return '<div class="stat-card"><div class="stat-val">' + String(x[1] != null ? x[1] : '—') + '</div><div class="stat-lbl">' + x[0] + '</div></div>';
      }).join('');
    }

    function renderConfig(list) {
      var el = document.getElementById('configArea');
      if (!el) return;
      el.innerHTML = '';
      if (!list || !list.length) {
        el.innerHTML = '<p class="muted">まだ設定行がありません。初回の保存時にシートへ追加されます。</p>';
        return;
      }
      list.forEach(function (row) {
        var key = String(row.key || '');
        var wrap = document.createElement('div');
        wrap.className = 'config-row';
        var lab = document.createElement('span');
        lab.className = 'config-key';
        var ja = configLabelJa(key);
        lab.appendChild(document.createTextNode(ja));
        if (ja !== key) {
          var sys = document.createElement('span');
          sys.className = 'config-key-system';
          sys.textContent = key;
          lab.appendChild(sys);
        }
        var inp = document.createElement('input');
        inp.type = 'text';
        inp.value = row.value != null ? String(row.value) : '';
        inp.setAttribute('aria-label', ja);
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn-sm';
        btn.textContent = '保存';
        btn.onclick = function () {
          saveOneConfig(key, inp.value);
        };
        wrap.appendChild(lab);
        wrap.appendChild(inp);
        wrap.appendChild(btn);
        el.appendChild(wrap);
      });
    }

    async function saveOneConfig(key, value) {
      try {
        if (typeof showLoading === 'function') showLoading('保存中', '');
        await sendToGAS_Safe('set_admin_config', { key: key, value: value });
        if (typeof hideLoading === 'function') hideLoading();
        if (typeof showToast === 'function') showToast('success', '保存しました');
      } catch (e) {
        if (typeof hideLoading === 'function') hideLoading();
        if (typeof showToast === 'function') showToast('error', e.message || '失敗しました');
      }
    }

    window.doGateLogin = async function () {
      var id = document.getElementById('gateId').value.trim();
      var pw = document.getElementById('gatePw').value;
      try {
        if (typeof showLoading === 'function') showLoading('認証中', '');
        var res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'admin_gate_login', loginId: id, password: pw })
        });
        var data = await res.json();
        if (typeof hideLoading === 'function') hideLoading();
        if (data.success && data.profile && data.authToken) {
          if (typeof login === 'function') login(data.profile, data.authToken);
          if (typeof showToast === 'function') showToast('success', '管理者セッションを発行しました');
          location.reload();
        } else {
          if (typeof showToast === 'function') showToast('error', (data && data.error) || '失敗しました');
        }
      } catch (e) {
        if (typeof hideLoading === 'function') hideLoading();
        if (typeof showToast === 'function') showToast('error', '通信エラー');
      }
    };

    window.addEventListener('DOMContentLoaded', async function () {
      var profile = typeof getCurrentProfile === 'function' ? getCurrentProfile() : null;
      var gateEl = document.getElementById('gatePanel');
      var mainEl = document.getElementById('dashMain');

      if (!profile || profile.role !== 'admin') {
        if (gateEl) gateEl.style.display = 'block';
        return;
      }

      if (mainEl) mainEl.style.display = 'block';
      if (typeof ringLogClientAccess === 'function') ringLogClientAccess('admin_dashboard');

      try {
        if (typeof showLoading === 'function') showLoading('読込中', '');
        var dash = await sendToGAS_Safe('get_admin_dashboard', {});
        var cfg = await sendToGAS_Safe('get_admin_config', {});
        if (typeof hideLoading === 'function') hideLoading();
        renderStats(dash.summary);
        renderConfig(cfg.config);
      } catch (e) {
        if (typeof hideLoading === 'function') hideLoading();
        if (typeof showToast === 'function') showToast('error', e.message || '読込に失敗しました');
      }
    });
  </script>
</body>
</html>
