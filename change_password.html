<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json">
    <title>車のお薬手帳</title>
  <link rel="stylesheet" href="common.css">
  <script src="app.js"></script>
  <script src="theme.js"></script>
  <style>
    .pw-field { position: relative; }
    .pw-field input { padding-right: 56px; }
    .pw-toggle {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: var(--tap-min); height: var(--tap-min);
      display: inline-flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; font-size: 20px; color: var(--muted);
      padding: 0; line-height: 1; border-radius: 50%;
      -webkit-tap-highlight-color: transparent;
    }
    .pw-toggle:active { background: rgba(0,0,0,0.06); }
    .err-msg { display: none; color: #dc2626; font-size: 12px; font-weight: 800; margin-top: 4px; }
    .info-box {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 24px; font-size: 13px; font-weight: 700;
      color: #92400e; line-height: 1.6;
    }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--line); transition: 0.3s; }
    .strength-bar .fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }
    .strength-label { font-size: 11px; font-weight: 800; margin-top: 3px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a id="backBtn" class="back-link">≪戻る</a>
      <h1 class="title">パスワード変更</h1>
    </div>

    <div class="info-box">
      🔑 この設定はオーナー専用です。<br>
      変更後、全スタッフは新しいパスワードでログインしてください。
    </div>

    <div class="card">
      <div class="field">
        <span class="label">現在のパスワード <span class="required">※必須</span></span>
        <div class="pw-field">
          <input type="password" id="currentPw" placeholder="現在のパスワードを入力">
          <button class="pw-toggle" onclick="togglePw('currentPw', this)" type="button">👁</button>
        </div>
        <div class="err-msg" id="errCurrent">⚠ 現在のパスワードを入力してください</div>
      </div>

      <div class="field">
        <span class="label">新しいパスワード <span class="required">※必須</span></span>
        <div class="pw-field">
          <input type="password" id="newPw" placeholder="8文字以上推奨" oninput="checkStrength(this.value)">
          <button class="pw-toggle" onclick="togglePw('newPw', this)" type="button">👁</button>
        </div>
        <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel">強度：未入力</div>
        <div class="err-msg" id="errNew">⚠ 新しいパスワードを入力してください</div>
      </div>

      <div class="field">
        <span class="label">新しいパスワード（確認） <span class="required">※必須</span></span>
        <div class="pw-field">
          <input type="password" id="confirmPw" placeholder="もう一度入力">
          <button class="pw-toggle" onclick="togglePw('confirmPw', this)" type="button">👁</button>
        </div>
        <div class="err-msg" id="errConfirm">⚠ パスワードが一致しません</div>
      </div>
    </div>

    <div class="save-area">
      <button class="save-btn" id="saveBtn" onclick="execChange()">パスワードを変更する</button>
    </div>
  </div>

  <script>
    let currentProfile = null;

    window.addEventListener('DOMContentLoaded', () => {
      currentProfile = typeof getCurrentProfile === 'function' ? getCurrentProfile() : null;

      // 未ログインはロール別ログイン画面へ
      if (!currentProfile) {
        location.replace('login.html');
        return;
      }

      const isUser = currentProfile.role === 'user' || currentProfile.shopType === 'user';

      // 事業者スタッフはオーナーのみ変更可
      const isBizStaff = (currentProfile.shopType === 'factory' || currentProfile.shopType === 'dealer')
                         && currentProfile.role !== 'master';
      if (isBizStaff) {
        showToast('error', 'パスワード変更はオーナー専用です。オーナーにご依頼ください。');
        setTimeout(() => history.back(), 1500);
        return;
      }

      // 説明文をロールに合わせて変更
      const infoBox = document.querySelector('.info-box');
      if (isUser) {
        infoBox.innerHTML = '🔑 ご自身のアカウントパスワードを変更します。<br>変更後は新しいパスワードでログインしてください。';
      } else if (currentProfile.role === 'master') {
        infoBox.innerHTML = '🔑 この設定はオーナー専用です。<br>変更後、全スタッフは新しいパスワードでログインしてください。';
      }

      const backUrl = isUser ? 'user_home.html'
                    : (currentProfile.shopType === 'dealer' ? 'dealer_home.html' : 'factory_home.html');
      document.getElementById('backBtn').onclick = () => goBackSmart(backUrl);
    });

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      if (el.type === 'password') { el.type = 'text'; btn.textContent = '🙈'; }
      else { el.type = 'password'; btn.textContent = '👁'; }
    }

    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      if (!val) { fill.style.width = '0'; label.textContent = '強度：未入力'; return; }
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { pct: '20%', color: '#ef4444', text: '弱い' },
        { pct: '40%', color: '#f97316', text: 'やや弱い' },
        { pct: '60%', color: '#eab308', text: '普通' },
        { pct: '80%', color: '#84cc16', text: '強い' },
        { pct: '100%', color: '#10b981', text: '非常に強い' },
      ];
      const lv = levels[Math.min(score, 4)];
      fill.style.width = lv.pct;
      fill.style.background = lv.color;
      label.textContent = `強度：${lv.text}`;
      label.style.color = lv.color;
    }

    async function execChange() {
      const cur  = document.getElementById('currentPw').value;
      const nw   = document.getElementById('newPw').value;
      const conf = document.getElementById('confirmPw').value;

      document.getElementById('errCurrent').style.display = 'none';
      document.getElementById('errNew').style.display = 'none';
      document.getElementById('errConfirm').style.display = 'none';

      let hasErr = false;
      if (!cur)  { document.getElementById('errCurrent').style.display = 'block'; hasErr = true; }
      if (!nw)   { document.getElementById('errNew').style.display = 'block'; hasErr = true; }
      if (nw && nw !== conf) { document.getElementById('errConfirm').style.display = 'block'; hasErr = true; }
      if (hasErr) return;

      const isDemo = currentProfile.userId && currentProfile.userId.includes('DEMO');
      if (isDemo) {
        showToast('error', 'デモモード中はパスワード変更できません。本番ログイン後にご利用ください。');
        return;
      }

      const isUser = currentProfile.role === 'user' || currentProfile.shopType === 'user';
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      showLoading('変更中', 'パスワードを更新しています...');

      try {
        // ユーザーと事業者でアクションを切り替え
        const payload = isUser
          ? {
              action: 'user_change_password',
              userId:          currentProfile.userId,
              loginId:         currentProfile.loginId || currentProfile.userId,
              currentPassword: cur,
              newPassword:     nw
            }
          : {
              action: 'change_password',
              shopId:          currentProfile.shopId,
              loginId:         currentProfile.userId,
              currentPassword: cur,
              newPassword:     nw
            };

        const res  = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        hideLoading();

        if (data.success) {
          showToast('success', 'パスワードを変更しました');
          document.getElementById('currentPw').value = '';
          document.getElementById('newPw').value = '';
          document.getElementById('confirmPw').value = '';
          checkStrength('');
        } else {
          showToast('error', '変更失敗: ' + (data.error || '現在のパスワードが正しくない可能性があります'));
        }
      } catch (e) {
        hideLoading();
        showToast('error', '通信エラーが発生しました。時間をおいて再度お試しください。');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
