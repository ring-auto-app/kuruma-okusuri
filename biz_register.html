<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json">
    <title>車のお薬手帳</title>
  
  <link rel="stylesheet" href="common.css">
  <script src="app.js?v=20260528-v26"></script>
  <script src="theme.js"></script>
  
  <style>
    /* ページ固有のデザイン設定：34pxルールおよびレイアウトを維持 */
    #factoryArea { display: none; margin-top: 16px; padding-top: 16px; border-top: 2px dashed var(--line); }
    .required { color: #ef4444; font-size: 11px; margin-left: 6px; }
    .login-link { text-align: center; margin-top: 24px; font-size: 14px; font-weight: 800; }
    .login-link a { color: var(--accent); text-decoration: none; border-bottom: 2px solid var(--accent); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 56px; }
    .pw-eye {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: var(--tap-min); height: var(--tap-min);
      display: inline-flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; font-size: 20px; color: var(--muted);
      padding: 0; border-radius: 50%; -webkit-tap-highlight-color: transparent;
    }
    .pw-eye:active { background: rgba(0,0,0,0.06); }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <a class="back-link" onclick="goBackSmart('index.html')">◁ 戻る</a>
    </div>

    <h1 class="title" id="bizRegisterTitle" style="margin-bottom: 34px;">🏢 業者アカウント登録</h1>
    
    <form id="bizRegisterForm" class="card" onsubmit="registerShop(event)">
      <input type="hidden" id="inAccountKind" value="dealer">
      <div class="field">
        <span class="label">会社名 / 屋号 <span class="required">必須</span></span>
        <input type="text" id="inShopName" placeholder="例：Aモータース" required>
      </div>
      
      <div class="field">
        <span class="label">業態 <span class="required">必須</span></span>
        <select id="inShopType" required>
          <option value="" disabled selected hidden>選択してください</option>
          <option value="整備工場（分解整備を行う）">整備工場（分解整備を行う）</option>
          <optgroup label="販売・サービス">
            <option value="整備工場（分解整備を行わない）">整備工場（分解整備を行わない）</option>
            <option value="販売業">販売業</option>
            <option value="レンタカー業">レンタカー業</option>
          </optgroup>
          <optgroup label="運輸・交通">
            <option value="道路貨物運送業">道路貨物運送業</option>
            <option value="交通・運輸業">交通・運輸業</option>
          </optgroup>
          <optgroup label="その他">
            <option value="その他">その他</option>
          </optgroup>
        </select>
      </div>
      
      <div id="factoryArea">
        <div class="field">
          <span class="label">工場種別</span>
          <select id="inFactoryType">
            <option value="認証">認証工場（黄色バッジ）</option>
            <option value="指定">指定工場（青色バッジ）</option>
          </select>
        </div>
        
        <div class="field">
          <span class="label">管轄の運輸局・支局 <span class="required">必須</span></span>
          <select id="inTransportBureau">
            <option value="" disabled selected hidden>選択してください</option>
            <optgroup label="北海道運輸局">
              <option value="北海道運輸局 札幌">札幌</option>
              <option value="北海道運輸局 函館">函館</option>
              <option value="北海道運輸局 旭川">旭川</option>
              <option value="北海道運輸局 室蘭">室蘭</option>
              <option value="北海道運輸局 釧路">釧路</option>
              <option value="北海道運輸局 帯広">帯広</option>
              <option value="北海道運輸局 北見">北見</option>
            </optgroup>
            <optgroup label="東北運輸局">
              <option value="東北運輸局 青森">青森</option>
              <option value="東北運輸局 岩手">岩手</option>
              <option value="東北運輸局 宮城">宮城</option>
              <option value="東北運輸局 秋田">秋田</option>
              <option value="東北運輸局 山形">山形</option>
              <option value="東北運輸局 福島">福島</option>
            </optgroup>
            <optgroup label="関東運輸局">
              <option value="関東運輸局 茨城">茨城</option>
              <option value="関東運輸局 栃木">栃木</option>
              <option value="関東運輸局 群馬">群馬</option>
              <option value="関東運輸局 埼玉">埼玉</option>
              <option value="関東運輸局 千葉">千葉</option>
              <option value="関東運輸局 東京">東京</option>
              <option value="関東運輸局 神奈川">神奈川</option>
              <option value="関東運輸局 山梨">山梨</option>
            </optgroup>
            <optgroup label="北陸信越運輸局">
              <option value="北陸信越運輸局 新潟">新潟</option>
              <option value="北陸信越運輸局 長野">長野</option>
              <option value="北陸信越運輸局 富山">富山</option>
              <option value="北陸信越運輸局 石川">石川</option>
            </optgroup>
            <optgroup label="中部運輸局">
              <option value="中部運輸局 福井">福井</option>
              <option value="中部運輸局 岐阜">岐阜</option>
              <option value="中部運輸局 静岡">静岡</option>
              <option value="中部運輸局 愛知">愛知</option>
              <option value="中部運輸局 三重">三重</option>
            </optgroup>
            <optgroup label="近畿運輸局">
              <option value="近畿運輸局 滋賀">滋賀</option>
              <option value="近畿運輸局 京都">京都</option>
              <option value="近畿運輸局 大阪">大阪</option>
              <option value="近畿運輸局 兵庫">兵庫</option>
              <option value="近畿運輸局 奈良">奈良</option>
              <option value="近畿運輸局 和歌山">和歌山</option>
            </optgroup>
            <optgroup label="中国運輸局">
              <option value="中国運輸局 鳥取">鳥取</option>
              <option value="中国運輸局 島根">島根</option>
              <option value="中国運輸局 岡山">岡山</option>
              <option value="中国運輸局 広島">広島</option>
              <option value="中国運輸局 山口">山口</option>
            </optgroup>
            <optgroup label="四国運輸局">
              <option value="四国運輸局 徳島">徳島</option>
              <option value="四国運輸局 香川">香川</option>
              <option value="四国運輸局 愛媛">愛媛</option>
              <option value="四国運輸局 高知">高知</option>
            </optgroup>
            <optgroup label="九州運輸局">
              <option value="九州運輸局 福岡">福岡</option>
              <option value="九州運輸局 佐賀">佐賀</option>
              <option value="九州運輸局 長崎">長崎</option>
              <option value="九州運輸局 熊本">熊本</option>
              <option value="九州運輸局 大分">大分</option>
              <option value="九州運輸局 宮崎">宮崎</option>
              <option value="九州運輸局 鹿児島">鹿児島</option>
            </optgroup>
            <optgroup label="沖縄総合事務局">
              <option value="沖縄総合事務局 沖縄">沖縄</option>
            </optgroup>
          </select>
        </div>

        <div class="field">
          <span class="label">認証・指定番号 <span class="required">必須</span></span>
          <input type="text" id="inFactoryNumber" placeholder="例：第12345号">
        </div>
      </div>
      
      <div class="field">
        <span class="label">ログイン用メールアドレス <span class="required">必須</span></span>
        <input type="email" id="inLoginEmail" placeholder="例：shop@example.com" autocomplete="username"
               autocapitalize="none" inputmode="email" required>
      </div>

      <div class="field">
        <span class="label">代表者名・ご担当者名 <span class="required">必須</span></span>
        <input type="text" id="inRepresentativeName" placeholder="例：山田 太郎（日常点検などの入力者表示に使います）" autocomplete="name" required>
      </div>
      
      <div class="field">
        <span class="label">会社共通パスワード <span class="required">必須</span></span>
        <div class="pw-wrap">
          <input type="password" id="inPassword" placeholder="スタッフ全員で使うパスワード" required minlength="1">
          <button type="button" class="pw-eye" onclick="const i=document.getElementById('inPassword'); i.type=i.type==='password'?'text':'password'; this.textContent=i.type==='password'?'👁':'🙈';">👁</button>
        </div>
      </div>
      
      <button type="submit" class="save-btn">この内容で登録する</button>
    </form>
    
    <div class="login-link">すでに登録済みの方は <a id="bizRegisterLoginLink" href="login.html?tab=business">こちらからログイン</a></div>
  </div>

  <script>
    function getAccountKind_() {
      var el = document.getElementById('inAccountKind');
      var kind = el ? String(el.value || '').trim() : '';
      return kind === 'factory' || kind === 'dealer' ? kind : 'dealer';
    }

    function syncFactoryFieldRequired_() {
      var isFactory = getAccountKind_() === 'factory';
      var bureau = document.getElementById('inTransportBureau');
      var fNum = document.getElementById('inFactoryNumber');
      if (bureau) bureau.required = isFactory;
      if (fNum) fNum.required = isFactory;
    }

    function syncFactoryAreaVisibility_() {
      var factoryArea = document.getElementById('factoryArea');
      var isFactory = getAccountKind_() === 'factory';
      if (factoryArea) factoryArea.style.display = isFactory ? 'block' : 'none';
      syncFactoryFieldRequired_();
    }

    function applyBizRegisterTypeFromUrl() {
      var params = new URLSearchParams(window.location.search);
      var type = params.get('type');
      var kindEl = document.getElementById('inAccountKind');
      var loginLink = document.getElementById('bizRegisterLoginLink');
      var titleEl = document.getElementById('bizRegisterTitle');
      if (type === 'factory' || type === 'dealer') {
        if (kindEl) kindEl.value = type;
      }
      syncFactoryAreaVisibility_();
      if (loginLink) {
        loginLink.href = getAccountKind_() === 'factory'
          ? 'login.html?tab=factory'
          : 'login.html?tab=business';
      }
      if (titleEl) {
        titleEl.textContent = getAccountKind_() === 'factory'
          ? '🏭 整備工場アカウント登録'
          : '🏢 事業者アカウント登録';
      }
    }

    document.addEventListener('DOMContentLoaded', applyBizRegisterTypeFromUrl);

    /**
     * アカウント登録処理：GASとの通信およびプロフィールの保存
     */
    async function registerShop(ev) {
      if (ev && ev.preventDefault) ev.preventDefault();

      const form = document.getElementById('bizRegisterForm');
      if (form && !form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const accountKind = getAccountKind_();
      const shopName = document.getElementById('inShopName').value.trim();
      const loginEmail = document.getElementById('inLoginEmail').value.trim();
      const representativeName = document.getElementById('inRepresentativeName').value.trim();
      const businessType = document.getElementById('inShopType').value.trim();
      const password = document.getElementById('inPassword').value.trim();
      
      let factoryType = "";
      let fullFactoryNumber = "";

      if (!shopName || !password) {
        if (typeof showToast === 'function') showToast('error', '会社名とパスワードは必須です');
        return;
      }
      if (!businessType) {
        if (typeof showToast === 'function') showToast('error', '業態を選択してください');
        return;
      }
      if (!loginEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginEmail)) {
        if (typeof showToast === 'function') showToast('error', 'ログイン用メールアドレスを正しく入力してください');
        return;
      }
      if (!representativeName) {
        if (typeof showToast === 'function') showToast('error', '代表者名・ご担当者名を入力してください。');
        return;
      }

      if (accountKind === 'factory') {
        factoryType = document.getElementById('inFactoryType').value;
        const bureau = document.getElementById('inTransportBureau').value;
        const fNum = document.getElementById('inFactoryNumber').value.trim();
        
        if (!bureau || !fNum) {
          if (typeof showToast === 'function') showToast('error', '管轄の運輸局と番号を入力してください');
          return;
        }
        
        fullFactoryNumber = bureau + " " + fNum; 
      }

      const randomStr = Math.random().toString(36).substr(2, 4).toUpperCase();
      const shopIdPrefix = accountKind === 'dealer' ? 'DLR' : 'FAC';
      const shopId = shopIdPrefix + "-" + randomStr;
      const masterLoginId = shopId + "-0000";

      const profile = { 
        shopId: shopId, 
        shopName: shopName, 
        shopType: accountKind, 
        businessType: businessType,
        factoryType: factoryType, 
        factoryNumber: fullFactoryNumber,
        staffId: "0000", 
        staffName: masterLoginId, 
        displayName: "マスター", 
        role: "master" 
      };
      
      showLoading("登録処理中", "サーバーと通信しています...");

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action:        'register_shop',
            shopId:        shopId,
            shopName:      shopName,
            loginEmail:    loginEmail,
            representativeName: representativeName,
            shopType:      accountKind,
            businessType:  businessType,
            factoryType:   factoryType,
            factoryNumber: fullFactoryNumber,
            password:      password
          })
        });
        const result = await res.json();

        if (result.success) {
          // GAS が発行した正式な shopId と masterLoginId を使う
          const finalShopId    = result.shopId        || shopId;
          const finalMasterId  = result.masterLoginId || (finalShopId + '-0000');
          const savedEmail = loginEmail;
          const loginTab = accountKind === 'factory' ? 'factory' : 'business';

          if (typeof ringClearUserAuthForShopLogin === 'function') {
            ringClearUserAuthForShopLogin();
          }

          hideLoading();

          document.body.innerHTML = `
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0fdf4;padding:24px;box-sizing:border-box;">
              <div style="background:#fff;border:3px solid #16a34a;border-radius:20px;padding:32px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.1);">
                <div style="font-size:40px;margin-bottom:12px;">✅</div>
                <div style="font-size:20px;font-weight:900;color:#15803d;margin-bottom:20px;">登録完了しました！</div>
                <div style="background:#eff6ff;border:2px solid #bfdbfe;border-radius:12px;padding:16px;margin-bottom:12px;">
                  <div style="font-size:12px;font-weight:800;color:#1e40af;margin-bottom:4px;">ログイン用メール</div>
                  <div style="font-size:16px;font-weight:900;color:#1d4ed8;word-break:break-all;">${savedEmail}</div>
                </div>
                <div style="background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:12px;margin-bottom:20px;font-size:13px;font-weight:700;color:#166534;">
                  上記メールと登録時のパスワードでログインできます。
                </div>
                <button onclick="location.replace('login.html?tab=${loginTab}')"
                  style="width:100%;padding:16px;background:#16a34a;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;">
                  ログイン画面へ →
                </button>
              </div>
            </div>`;
        } else {
          hideLoading();
          showToast('error', '登録エラー: ' + result.error);
        }
      } catch (e) {
        hideLoading();
        showToast('error', 'サーバーへの接続に失敗しました。GAS URLを確認してください。');
        console.error(e);
      }
    }
  </script>
</body>
</html>
