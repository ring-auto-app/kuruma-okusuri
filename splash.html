<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json">
    <title>車のお薬手帳</title>
  
  <link rel="stylesheet" href="common.css">
  <script src="app.js?v=20260528-v25"></script> 
  <script src="theme.js"></script>
  
  <style>
    html { height: 100%; }
    body {
      margin: 0;
      background-color: #ffffff;
      min-height: 100dvh;
      height: 100%;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }
    
    body.fade-out {
      opacity: 0;
    }

    .splash-view {
      display: flex;
      flex-direction: column;
      align-items: center; 
      gap: 70px; 
      animation: fadeIn 0.8s ease-in forwards;
    }

    .splash-icon {
      width: 220px; 
      height: auto;
      display: block;
    }

    .title-box {
      width: 220px; 
      display: flex;
      flex-direction: column;
      align-items: flex-end; 
      gap: 8px; 
    }

    .main-title {
      margin: 0;
      font-family: "Hiragino Sans", sans-serif;
      font-weight: 800; 
      font-size: 28px;
      color: #000;
      border-bottom: 2px solid #000;
      padding-bottom: 2px;
      line-height: 1.1;
      letter-spacing: 0.1em;
    }

    .sub-title {
      margin: 0;
      font-family: "Hiragino Mincho ProN", serif;
      font-weight: 600; 
      font-size: 20px;
      color: #000;
      border-bottom: 2px solid #000;
      padding-bottom: 2px;
      line-height: 1.1;
      letter-spacing: 0.1em;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 520px) {
      .splash-icon {
        width: 180px; 
      }
      .title-box {
        width: 180px; 
      }
      .main-title {
        font-size: 24px;
      }
      .sub-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="splash-view">
    <img src="icons/splash-logo.png" alt="車のお薬手帳" class="splash-icon">

    <div class="title-box">
      <h1 class="main-title">車のお薬手帳</h1>
      <h2 class="sub-title">RinG Auto</h2>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var skipAnim = sessionStorage.getItem('splashShown') === '1';
      var mainDelay = skipAnim ? 0 : 2500;
      var fadeDelay = skipAnim ? 0 : 500;
      setTimeout(function () {
        if (!skipAnim) document.body.classList.add("fade-out");
        setTimeout(function () {
          sessionStorage.setItem('splashShown', '1');
          var homeUrl = typeof ringTryOptimisticEntryRedirect_ === 'function'
            ? ringTryOptimisticEntryRedirect_()
            : null;
          if (homeUrl) {
            location.href = homeUrl;
            return;
          }
          location.href = "index.html";
        }, fadeDelay);
      }, mainDelay);
    });
  </script>
</body>
</html>
