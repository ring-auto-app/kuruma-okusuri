<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4b5563" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="車のお薬手帳" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json">
    <title>車のお薬手帳</title>

  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="ads/ring-ads.css">
  <script src="app.js?v=20260621-v29"></script>
  <script src="theme.js"></script>
  <script src="ads/ads.js"></script>

  <style>
    /* ユーザーテーマ：黄色ベース */
    :root {
      --page-bg:   #f7f3ea;
      --page-line: rgba(80, 65, 45, 0.10);
      --paper:     #ffffff;
      --line:      #fde047;
      --text:      #2f2a24;
      --muted:     #a16207;
      --accent:    #eab308;
      --highlighter: rgba(234, 179, 8, 0.4);
      --shadow:    0 4px 10px rgba(0,0,0,0.05);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(to bottom, var(--page-line) 1px, transparent 1px) 0 0 / 100% 34px,
        var(--page-bg);
      color: var(--text);
      padding: 34px 16px 120px;
      line-height: 34px;
    }

    .container { max-width: 520px; margin: 0 auto; }

    /* ヘッダー */
    .header {
      margin-bottom: 34px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-titles { min-width: 0; }
    .header-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      max-width: 100%;
    }
    .ring-admin-dash-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
      text-decoration: underline;
      cursor: pointer;
      line-height: 1.3;
    }

    .title {
      font-size: 26px; font-weight: 900; color: var(--text); margin: 0;
      position: relative; display: inline-block; line-height: 34px;
    }
    .title::after {
      content: ""; position: absolute;
      left: 0; right: 0; bottom: 4px; height: 12px;
      background: var(--highlighter); z-index: -1;
      border-radius: 4px; transform: rotate(-1deg);
    }

    /* ユーザー情報：付箋（静的・押しても動かない） */
    .user-card {
      position: relative;
      background: linear-gradient(180deg, #fffef0 0%, #fef9c3 38%, #fde68a 100%);
      border: none;
      border-radius: 3px 3px 14px 3px;
      padding: 22px 18px 18px;
      margin-bottom: 34px;
      line-height: 1.5;
      box-shadow:
        2px 4px 0 rgba(180, 150, 60, 0.22),
        0 10px 24px rgba(50, 40, 28, 0.08);
      transform: rotate(-0.6deg);
    }
    .user-card::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      transform: translate(-50%, -40%);
      width: 44%;
      max-width: 140px;
      height: 14px;
      border-radius: 3px;
      background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(230,220,200,0.55));
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .user-card::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 22px 22px;
      border-color: transparent transparent rgba(245, 230, 170, 0.95) transparent;
      filter: drop-shadow(-1px -1px 0 rgba(180, 150, 80, 0.2));
    }
    .user-id   { font-size: 12px; font-weight: 700; color: var(--text); opacity: 0.78; }

    /* メインメニュー：付箋ノートカード */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 34px;
    }

    .note-card {
      position: relative;
      border-radius: 18px 18px 0 18px;
      padding: 24px 16px;
      box-shadow: 6px 10px 20px rgba(50, 40, 28, 0.12);
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      transition: all 0.15s ease;
      cursor: pointer;
      transform: translateY(-2px);
    }
    .note-card:hover  { transform: translateY(-6px); box-shadow: 10px 16px 28px rgba(50,40,28,0.18); }
    .note-card:active { transform: translateY(1px);  box-shadow: 2px 4px 10px rgba(50,40,28,0.10); }

    /* 付箋の折れ角 */
    .note-card::after {
      content: ""; position: absolute;
      right: -1px; bottom: -1px; width: 0; height: 0;
      border-style: solid; border-width: 0 0 28px 28px;
      border-color: transparent transparent var(--page-bg) transparent;
    }

    .card-yellow { background: #fbf6de; }
    .card-green  { background: #edf5ec; }

    .card-icon {
      width: 52px; height: 52px; border-radius: 13px;
      display: grid; place-items: center; font-size: 26px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.07);
      flex-shrink: 0;
    }
    .card-title { font-size: 15px; font-weight: 900; margin: 0; line-height: 1.2; }
    .ring-pending-sync {
      background: #fef3c7; border: 2px solid #f59e0b; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 20px; font-size: 13px; font-weight: 800; color: #92400e; line-height: 1.5;
    }
    .ring-ownership-transfer-alert {
      background: #fef2f2; border: 2px solid #dc2626; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 20px; font-size: 13px; font-weight: 800;
      color: #991b1b; line-height: 1.55;
    }
    .ring-ownership-transfer-alert p { margin: 0 0 10px; }
    .ring-ownership-transfer-alert p:last-of-type { margin-bottom: 12px; }
    .ring-ownership-transfer-alert .ring-ownership-vin {
      font-weight: 900; word-break: break-all;
    }
    .ring-ownership-transfer-dismiss {
      display: inline-block; min-height: var(--tap-min); padding: 8px 16px;
      border: 2px solid #dc2626; border-radius: 10px; background: #fff;
      color: #dc2626; font-size: 13px; font-weight: 900; cursor: pointer;
    }
    .ring-ownership-notice {
      background: #fffbeb; border: 2px dashed #eab308; border-radius: 12px;
      padding: 14px 16px; margin: 28px 0 20px; font-size: 12px; font-weight: 700;
      color: #713f12; line-height: 1.6;
    }
    .ring-ownership-notice-title {
      font-size: 13px; font-weight: 900; margin: 0 0 8px; color: #92400e;
    }
    .ring-ownership-notice ul {
      margin: 0; padding-left: 1.2em;
    }
    .ring-ownership-notice li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- ヘッダー -->
    <div class="header">
      <div class="header-titles">
        <h1 class="title">ホーム</h1>
        <a href="admin_dashboard.html" id="ringAdminDashLink" class="ring-admin-dash-link" style="display:none;">管理者ダッシュボード</a>
      </div>
      <div class="header-meta" style="text-align:right;">
        <span id="displayDate" style="font-size:12px; font-weight:800; color:var(--muted);"></span>
        <div>
          <button type="button" id="ringRefreshUserHomeBtn" style="font-size:13px;font-weight:800;border:none;background:transparent;color:var(--accent);cursor:pointer;padding:0;line-height:28px;white-space:nowrap;">🔄 更新</button>
        </div>
        <div id="ringUserHomeLastSync" style="font-size:11px;color:var(--muted);font-weight:700;line-height:1.2;"></div>
        <div id="ringUserHomeSyncStatus" style="display:none;"></div>
      </div>
    </div>

    <div id="ringPwaInstallBanner" class="ring-pwa-banner" role="region" aria-label="アプリをホーム画面に追加">
      <p>ホーム画面に追加すると、次回からすぐ開けます。</p>
      <div class="ring-pwa-actions">
        <button type="button" class="ring-pwa-primary" onclick="ringRunPwaInstallPrompt()">ホームに追加</button>
        <button type="button" class="ring-pwa-secondary" onclick="ringDismissPwaInstallBanner()">あとで</button>
      </div>
    </div>

    <!-- ユーザー情報 -->
    <div class="user-card">
      <div class="user-id" id="userNickLine" style="font-size:15px;font-weight:900;opacity:1;margin-bottom:4px;">ニックネーム：---</div>
      <div class="user-id" id="userId">ログインID：---</div>
      <div class="user-id" id="userIdInner" style="margin-top:6px;">ユーザーID：---</div>
    </div>

    <div id="ringPendingSyncBar" class="ring-pending-sync" style="display:none;" role="status"></div>

    <!-- メインメニュー -->
    <div class="menu-list">
      <a onclick="location.href='vehicles.html'" class="note-card card-yellow">
        <div class="card-icon">🚗</div>
        <div class="card-title">マイカー</div>
      </a>

      <a onclick="location.href='user_fav_shops.html'" class="note-card card-green">
        <div class="card-icon">🏥</div>
        <div class="card-title">かかりつけの工場・お店</div>
      </a>
    </div>

    <div class="ring-ownership-notice" aria-label="ご利用上のお願い">
      <p class="ring-ownership-notice-title">⚠️ ご利用上のお願い</p>
      <ul>
        <li>車両を譲渡・売却・廃車した場合は、不要になった車両をマイカー一覧から削除してください。</li>
        <li>整備履歴は車台番号（VIN）ごとに管理されています。</li>
        <li>同じ車両を複数のユーザーが登録する場合があります（家族共有・共同管理など）。</li>
        <li>個人情報は他のユーザーに公開されません。</li>
      </ul>
    </div>

    <!-- 広告枠（ads/ads.js・RING_ADS_ENABLED 時のみ表示） -->
    <div class="ring-ad-section" aria-hidden="true" style="display:none;">
      <div class="ring-ad-section-label">おすすめ・お知らせ</div>
      <div class="ring-ad-list"></div>
    </div>
  </div>

  <script>
    var userHomeCacheKey = '';

    function getUserHomeSignature() {
      var vehicles = safeJsonParse(localStorage.getItem('nappy_vehicles_v1'), []);
      return (typeof ringVehiclesFullSignature_ === 'function')
        ? ringVehiclesFullSignature_(vehicles)
        : String(vehicles.length);
    }

    function buildUserHomeSyncOpts(statusMsg) {
      return {
        cacheKey: userHomeCacheKey,
        refreshBtn: document.getElementById('ringRefreshUserHomeBtn'),
        refreshLabel: '🔄 更新',
        statusElId: 'ringUserHomeSyncStatus',
        lastSyncElId: 'ringUserHomeLastSync',
        statusMessage: statusMsg || '最新データ取得中…',
        preserveScroll: false,
        getSignatureFn: getUserHomeSignature,
        renderFn: function () { /* 表示項目は静的 */ },
        syncFn: async function () {
          if (typeof syncVehiclesFromServer !== 'function') return { ok: false };
          try {
            await syncVehiclesFromServer();
            return { ok: true };
          } catch (e) {
            return { ok: false };
          }
        }
      };
    }

    async function loadUserHomeData(isManualRefresh) {
      var fresh = (typeof ringIsPageCacheFresh_ === 'function') && ringIsPageCacheFresh_(userHomeCacheKey, 'user_home');
      var hasMeta = !!(typeof ringGetPageSyncMeta_ === 'function' && ringGetPageSyncMeta_(userHomeCacheKey));
      var isFirstAccess = !hasMeta;

      if (isManualRefresh) {
        await ringRunPageSync_(buildUserHomeSyncOpts('最新データ取得中…'));
        return;
      }

      if (typeof ringUpdateLastSyncLabel_ === 'function') {
        ringUpdateLastSyncLabel_('ringUserHomeLastSync', userHomeCacheKey);
      }

      if (isFirstAccess) {
        await ringRunPageSync_(buildUserHomeSyncOpts('同期中…'));
        return;
      }

      if (fresh) return;

      ringRunPageSync_(buildUserHomeSyncOpts('最新データ取得中…'));
    }

    window.addEventListener('DOMContentLoaded', function () {
      if (typeof ringBootAuthForMode === 'function') {
        var boot = ringBootAuthForMode('user');
        if (!boot.ok) {
          location.replace(boot.redirect || 'login.html?tab=user');
          return;
        }
      }

      // 今日の日付
      const today = new Date();
      const days  = ['日','月','火','水','木','金','土'];
      const el = document.getElementById('displayDate');
      if (el) el.textContent =
        today.getFullYear() + '年' + (today.getMonth()+1) + '月' +
        today.getDate() + '日（' + days[today.getDay()] + '）';

      // プロフィール確認・表示
      const profile = typeof getCurrentProfile === 'function' ? getCurrentProfile() : null;
      if (!profile || (typeof ringIsUserAccountProfile === 'function' && !ringIsUserAccountProfile(profile))) {
        location.replace('login.html?tab=user');
        return;
      }

      const idEl   = document.getElementById('userId');
      const idInner = document.getElementById('userIdInner');
      const nickEl = document.getElementById('userNickLine');
      if (nickEl) {
        const nick = String(profile.userName || '').trim();
        nickEl.textContent = 'ニックネーム：' + (nick ? nick : '未設定');
      }
      if (idEl)   idEl.textContent   = 'ログインID：' + (profile.loginId || profile.userId || '---');
      if (idInner) idInner.textContent = 'ユーザーID：' + (profile.userId || '---');

      userHomeCacheKey = 'user_home:' + (profile.userId || 'unknown');
      var refreshBtn = document.getElementById('ringRefreshUserHomeBtn');
      if (refreshBtn) refreshBtn.onclick = function () { loadUserHomeData(true); };

      if (typeof ringSetupBackgroundResync_ === 'function') {
        ringSetupBackgroundResync_({
          onResume: function () {
            if (typeof ringIsPageCacheFresh_ === 'function' && ringIsPageCacheFresh_(userHomeCacheKey, 'user_home')) return;
            ringRunPageSync_(buildUserHomeSyncOpts('最新データ取得中…'));
          }
        });
      }

      loadUserHomeData(false);

      if (typeof ringDeferAfterPaint_ === 'function') {
        ringDeferAfterPaint_(function () {
          const pend = typeof getPendingRetryCount === 'function' ? getPendingRetryCount() : 0;
          const pbar = document.getElementById('ringPendingSyncBar');
          if (pbar && pend > 0) {
            pbar.style.display = 'block';
            pbar.textContent = '未送信のデータが ' + pend + ' 件あります。オンライン復帰時に自動送信します。';
          }
          if (typeof ringAdsInit === 'function') ringAdsInit('user_home');
          var adl = document.getElementById('ringAdminDashLink');
          if (adl && (typeof ringIsAdminProfile === 'function' ? ringIsAdminProfile(profile) : profile.role === 'admin')) {
            adl.style.display = 'inline-block';
          }
          if (typeof ringTryShowPwaInstallBanner === 'function') ringTryShowPwaInstallBanner();
          if (typeof ringLogClientAccess === 'function') ringLogClientAccess('user_home');
        });
      } else {
        const pend = typeof getPendingRetryCount === 'function' ? getPendingRetryCount() : 0;
        const pbar = document.getElementById('ringPendingSyncBar');
        if (pbar && pend > 0) {
          pbar.style.display = 'block';
          pbar.textContent = '未送信のデータが ' + pend + ' 件あります。オンライン復帰時に自動送信します。';
        }
        if (typeof ringAdsInit === 'function') ringAdsInit('user_home');
        var adl = document.getElementById('ringAdminDashLink');
        if (adl && (typeof ringIsAdminProfile === 'function' ? ringIsAdminProfile(profile) : profile.role === 'admin')) {
          adl.style.display = 'inline-block';
        }
        if (typeof ringTryShowPwaInstallBanner === 'function') ringTryShowPwaInstallBanner();
        if (typeof ringLogClientAccess === 'function') ringLogClientAccess('user_home');
      }
    });
  </script>
</body>
</html>
