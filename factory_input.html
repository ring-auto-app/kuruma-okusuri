<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>整備入力 | 車のお薬手帳</title>
  
  <link rel="stylesheet" href="common.css">
  <script src="app.js"></script>
  <script src="theme.js"></script>
  
  <style>
    /* 34pxグリッド設計および付箋UI（角折れ28px）を完全維持 */
    .edit-link {
      display: block; color: var(--muted); font-size: 13.5px; font-weight: 800;
      text-decoration: underline; text-underline-offset: 4px; height: 34px; line-height: 34px; 
    }

    .scan-btn {
      width: 100%; height: 68px; box-sizing: border-box; background: rgba(255, 255, 255, 0.5);
      border: 2px dashed var(--accent); border-radius: 14px; display: flex;
      align-items: center; justify-content: center; color: var(--accent);
      font-weight: 900; font-size: 16px; cursor: pointer; margin-bottom: 34px; 
    }

    .doc-preview-area {
      display: none; margin-bottom: 34px; border: 2px solid var(--line); 
      border-radius: 12px; overflow: hidden; background: #fff;
    }
    .doc-preview-area img { width: 100%; display: block; filter: grayscale(50%); }
    
    .discard-notice { 
      font-size: 12px; color: var(--accent); font-weight: 800; text-align: center; 
      margin-bottom: 34px; line-height: 1.4;
    }

    .note-card {
      position: relative; background: var(--paper); border-radius: 18px 18px 0 18px; 
      padding: 24px 20px; box-shadow: var(--shadow); border: 1px solid var(--line); margin-bottom: 34px;
    }
    .note-card::after {
      content: ""; position: absolute; right: -1px; bottom: -1px; width: 0; height: 0;
      border-style: solid; border-width: 0 0 28px 28px; border-color: transparent transparent var(--page-bg) transparent; 
    }

    /* 全ての入力欄（数値入力を含む）のデザインを統一 */
    input[type="text"],
    input[type="number"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--line) !important; /* ここで枠線の色を統一 */
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
      background: #fff;
      outline: none;
    }

    #inVin {
      font-family: "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .photo-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .photo-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; 
      background: #fff; border: 2px solid var(--line);
      padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 800; color: var(--accent); cursor: pointer;
    }
    .photo-preview { width: 100%; max-width: 120px; border-radius: 12px; display: none; border: 1px solid var(--line); }

    .privacy-notice { 
      color: var(--accent); font-size: 12.5px; font-weight: 900; text-align: center; 
      height: 34px; line-height: 34px; margin: 0;
    }
  </style>
</head>
<body>
  
  <div class="container">
    <header class="header">
      <a onclick="goBackSmart('factory_home.html')" class="back-link">≪戻る</a>
      <h1 class="title">整備記録の入力</h1>
      <a href="factory_edit_list.html" class="edit-link">✏️ 過去7日間の入力履歴を編集する</a>
    </header>
    
    <div class="scan-btn" onclick="document.getElementById('docInput').click()">📄 請求書・明細書をスキャン</div>
    <input type="file" id="docInput" accept="image/*" hidden>

    <div class="doc-preview-area" id="docPreviewArea"><img id="docPreviewImg" src=""></div>
    <div class="discard-notice" id="discardNotice" style="display:none;">※画像は保存されず破棄されます</div>

    <div class="note-card">
      <div class="field">
        <span class="label">車台番号 (VIN) ※必須</span>
        <input id="inVin" type="text" placeholder="手入力も可" onblur="lookupVehicle(this.value)">
        <div id="vinVehicleInfo" style="display:none; margin-top:6px; font-size:12px; font-weight:800; color:var(--accent); background:rgba(37,99,235,0.06); border-radius:8px; padding:6px 10px; line-height:1.6;"></div>
      </div>

      <!-- 車両詳細情報（VIN入力欄直下） -->
      <details style="margin-bottom:10px;">
        <summary style="font-size:13px; font-weight:900; color:var(--muted); cursor:pointer; padding:6px 0; user-select:none;">
          ▶ 車両詳細情報を入力する（任意）
        </summary>
        <div style="margin-top:10px;">
          <div class="row">
            <div class="field">
              <span class="label">型式 <span style="font-size:11px; color:var(--muted);">※任意</span></span>
              <input id="inModel" type="text" placeholder="例：DBA-GT123">
            </div>
            <div class="field">
              <span class="label">原動機型式 <span style="font-size:11px; color:var(--muted);">※任意</span></span>
              <input id="inEngine" type="text" placeholder="例：2ZR-FXE">
            </div>
          </div>
          <div class="row">
            <div class="field">
              <span class="label">類別区分番号 <span style="font-size:11px; color:var(--muted);">※任意</span></span>
              <input id="inClass" type="text" placeholder="例：0001">
            </div>
            <div class="field">
              <span class="label">型式指定番号 <span style="font-size:11px; color:var(--muted);">※任意</span></span>
              <input id="inTypeDesig" type="text" placeholder="例：1234">
            </div>
          </div>
        </div>
      </details>

      <div class="row">
        <div class="field"><span class="label">作業日 ※必須</span><input id="inDate" type="date"></div>
        <div class="field">
          <span class="label">車検満了日 ※必須</span>
          <input id="inShaken" type="date">
          <div id="errShaken" style="display:none; color:#dc2626; font-size:12px; font-weight:800; margin-top:4px;">⚠ 車検満了日を入力してください</div>
        </div>
      </div>
      <div class="row">
        <div class="field"><span class="label">整備区分</span><input id="inTitle" type="text" placeholder="例：車検、修理"></div>
        <div class="field"><span class="label">走行距離 (km)</span><input id="inMileage" type="number" min="0"></div>
      </div>
      <div class="field"><span class="label">交換部品</span><textarea id="inParts" rows="3" placeholder="自動抽出されます"></textarea></div>
      <div class="field"><span class="label">整備メモ</span><textarea id="inMemo" rows="2" placeholder="特記事項があれば入力"></textarea></div>

      <div class="field" style="margin-bottom: 0;">
        <span class="label">写真（任意）</span>
        <div class="photo-area">
          <div class="photo-btn" onclick="document.getElementById('partsPhotoInput').click()">📷 写真追加</div>
          <img id="partsPhotoPreview" class="photo-preview" src="">
        </div>
        <input type="file" id="partsPhotoInput" accept="image/*" hidden>
        <input type="hidden" id="inPartsPhotoBase64">
      </div>
    </div>

    <button class="save-btn" id="saveLogBtn">内容を確認して登録</button>
    <p class="privacy-notice">＊「この内容で登録する」前に内容を確認できます。個人情報・金額に注意！</p>
  </div> 

  <script>
    let currentProfile = null;

    // VIN入力後に既存車両データを引き当てて表示・hidden欄に反映
    function lookupVehicle(rawVin) {
      const vin = rawVin.trim().toUpperCase();
      if (!vin) return;
      const vehicles = JSON.parse(localStorage.getItem('nappy_vehicles_v1') || '[]');
      const rec = vehicles.find(v => (v.vin || '').toUpperCase() === vin);
      const infoEl = document.getElementById('vinVehicleInfo');
      if (rec) {
        // 車検満了日が未入力なら自動セット
        if (rec.nextShaken && !document.getElementById('inShaken').value) {
          document.getElementById('inShaken').value = rec.nextShaken;
        }
        // hidden欄に反映
        document.getElementById('inModel').value     = rec.vehicleModel || rec.model || '';
        document.getElementById('inEngine').value    = rec.engine || '';
        document.getElementById('inClass').value     = rec.classification || rec.category || '';
        document.getElementById('inTypeDesig').value = rec.typeDesignation || '';
        // 情報バッジ表示
        const parts = [];
        if (rec.vehicleModel || rec.model) parts.push('型式：' + (rec.vehicleModel || rec.model));
        if (rec.engine)                    parts.push('原動機：' + rec.engine);
        if (rec.classification || rec.category) parts.push('類別：' + (rec.classification || rec.category));
        if (rec.typeDesignation)           parts.push('型式指定：' + rec.typeDesignation);
        if (parts.length) {
          infoEl.textContent = '✅ ' + parts.join('　');
          infoEl.style.display = 'block';
        } else {
          infoEl.style.display = 'none';
        }
      } else {
        infoEl.style.display = 'none';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      currentProfile = typeof getCurrentProfile === 'function' ? getCurrentProfile() : null;
      if (!currentProfile) return location.replace("login.html");

      // inspector（日常点検のみ）・viewer（閲覧のみ）は整備入力不可
      if (currentProfile.role === 'inspector' || currentProfile.role === 'viewer') {
        alert('整備記録の入力権限がありません。\nオーナーに権限設定をご確認ください。');
        history.back();
        return;
      }
      
      const today = new Date();
      const offset = today.getTimezoneOffset() * 60000;
      const localToday = new Date(today.getTime() - offset);
      document.getElementById('inDate').value = localToday.toISOString().split('T')[0];

      // VIN自動フォーマットは app.js のグローバル処理に統合済み

      const limitDate = new Date(localToday.getTime());
      limitDate.setDate(limitDate.getDate() - 14); 
      document.getElementById('inDate').min = limitDate.toISOString().split('T')[0];
      document.getElementById('inDate').max = localToday.toISOString().split('T')[0];
    });

    document.getElementById('docInput').addEventListener('change', async (e) => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('docPreviewImg').src = ev.target.result;
        document.getElementById('docPreviewArea').style.display = 'block';
        document.getElementById('discardNotice').style.display = 'block';
      };
      reader.readAsDataURL(file);

      showLoading("分析中", "AIが書類を読み取っています...");
      try {
        const res = await analyzeDocument([file]);
        if (res) {
          if(res.vin) document.getElementById('inVin').value = res.vin.toUpperCase();
          if(res.mileage) document.getElementById('inMileage').value = res.mileage;
          if(res.workTitle) document.getElementById('inTitle').value = res.workTitle;
          if(res.parts) document.getElementById('inParts').value = res.parts;
          if(res.shaken) document.getElementById('inShaken').value = res.shaken;
          if(res.model)  document.getElementById('inModel').value  = res.model;
          if(res.engine) document.getElementById('inEngine').value = res.engine;
          if(res.class)  document.getElementById('inClass').value  = res.class;
          if(res.vin)    lookupVehicle(res.vin);
          if(res.typeDesignation) document.getElementById('inTypeDesig').value = res.typeDesignation;
        }
      } finally { hideLoading(); }
    });

    document.getElementById('partsPhotoInput').addEventListener('change', (e) => {
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const preview = document.getElementById('partsPhotoPreview');
        preview.src = ev.target.result;
        preview.style.display = 'block';
        document.getElementById('inPartsPhotoBase64').value = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    async function performFactoryLogSave() {
      const vin = document.getElementById('inVin').value.trim().toUpperCase();
      const date = document.getElementById('inDate').value;
      const mileageInput = document.getElementById('inMileage').value;
      const shaken = document.getElementById('inShaken').value;

      showLoading("保存中", "記録をデータベースに書き込んでいます...");

      const logData = {
        vin: vin, date: date, mileage: mileageInput,
        nextShaken: shaken,
        vehicleModel: document.getElementById('inModel').value,
        engine:       document.getElementById('inEngine').value,
        classification: document.getElementById('inClass').value,
        typeDesignation: document.getElementById('inTypeDesig').value,
        title: document.getElementById('inTitle').value || "一般整備",
        parts: document.getElementById('inParts').value,
        memo: document.getElementById('inMemo').value,
        partsPhoto: document.getElementById('inPartsPhotoBase64').value,
        shopId: currentProfile.shopId,
        shopName: currentProfile.shopName,
        shopType: currentProfile.shopType || '',
        factoryType: currentProfile.factoryType || '',
        staffId: currentProfile.staffId || currentProfile.loginId || '',
        staffName: currentProfile.displayName || currentProfile.realName || '',
        createdAt: new Date().toISOString()
      };

      let logResult = { logId: null, localSaved: false, serverSaved: false };
      if (typeof saveLog === "function") {
        logResult = await saveLog(logData);
      } else {
        let logs = JSON.parse(localStorage.getItem('nappy_logs_v1') || '[]');
        logData.log_id = 'log_' + Date.now();
        logs.push(logData);
        localStorage.setItem('nappy_logs_v1', JSON.stringify(logs));
        logResult = { logId: logData.log_id, localSaved: true, serverSaved: false };
      }

      if (typeof addVehicle === "function") {
        await addVehicle({
          vin: vin,
          vehicleModel:    document.getElementById('inModel').value,
          engine:          document.getElementById('inEngine').value,
          classification:  document.getElementById('inClass').value,
          typeDesignation: document.getElementById('inTypeDesig').value,
          nextShaken: shaken,
          lastMaint: date
        });
      }

      hideLoading();
      if (logResult.serverSaved) {
        showToast('success', '正常に登録されました');
      } else {
        showToast('info', '端末に保存しました（サーバー反映は次回接続時）');
      }
      setTimeout(() => location.replace(`factory_history.html?vin=${encodeURIComponent(vin)}`), 1200);
    }

    document.getElementById("saveLogBtn").addEventListener("click", async () => {
      const vin = document.getElementById('inVin').value.trim().toUpperCase();
      const date = document.getElementById('inDate').value;
      const mileageInput = document.getElementById('inMileage').value;
      const shaken = document.getElementById('inShaken').value;

      let hasErr = false;
      if (!vin || !date) { showToast('error', 'VINと作業日は必須です'); return; }
      if (!shaken) {
        document.getElementById('errShaken').style.display = 'block';
        hasErr = true;
      } else {
        document.getElementById('errShaken').style.display = 'none';
      }
      if (hasErr) return;

      const currentMileage = parseInt(mileageInput, 10);
      if (!isNaN(currentMileage)) {
        try {
          const logs = JSON.parse(localStorage.getItem('nappy_logs_v1') || '[]');
          const vLogs = logs.filter(l => l.vin === vin).sort((a, b) => new Date(b.date) - new Date(a.date));
          if (vLogs.length > 0) {
            const lastM = parseInt(vLogs[0].mileage, 10);
            if (!isNaN(lastM) && currentMileage < lastM) {
              if (!confirm(`【確認】直近の記録（${lastM}km）より少ないです。間違いありませんか？`)) return;
            }
          }
        } catch(e) {}
      }

      const partsVal = document.getElementById('inParts').value;
      const memoVal = document.getElementById('inMemo').value;
      const photoOn = !!document.getElementById('inPartsPhotoBase64').value;
      const bodyHtml =
        ringConfirmRow('車台番号(VIN)', vin) +
        ringConfirmRow('作業日', date) +
        ringConfirmRow('車検満了日', shaken) +
        ringConfirmRow('整備区分', document.getElementById('inTitle').value || '一般整備') +
        ringConfirmRow('走行距離(km)', mileageInput || '—') +
        ringConfirmRow('型式', document.getElementById('inModel').value) +
        ringConfirmRow('原動機型式', document.getElementById('inEngine').value) +
        ringConfirmRow('類別区分番号', document.getElementById('inClass').value) +
        ringConfirmRow('型式指定番号', document.getElementById('inTypeDesig').value) +
        ringConfirmRow('交換部品', truncateRingConfirm(partsVal, 180)) +
        ringConfirmRow('整備メモ', truncateRingConfirm(memoVal, 180)) +
        ringConfirmRow('写真', photoOn ? '添付あり' : '—');

      const saveLogBtn = document.getElementById("saveLogBtn");
      showRingSaveConfirm({
        title: '整備記録の確認',
        bodyHtml: bodyHtml,
        confirmLabel: 'この内容で登録する',
        onConfirm: function () { runOnce(saveLogBtn, performFactoryLogSave); }
      });
    });
  </script>
</body>
</html>
